<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MDV WIP Builder — Menswear</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#111;background:#f4f4f4;min-height:100vh}
.header{background:#1A1A2E;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.h-title{color:#fff;font-size:15px;font-weight:500}
.h-sub{color:rgba(255,255,255,.45);font-size:11px;margin-top:2px}
.nav{background:#fff;border-bottom:1px solid #e5e5e5;padding:0 24px;display:flex}
.ntab{padding:11px 18px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#666;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit}
.ntab.active{color:#111;font-weight:500;border-bottom-color:#1A1A2E}
.page{padding:24px;max-width:960px;margin:0 auto}
.card{background:#fff;border-radius:12px;border:1px solid #e5e5e5;padding:20px 24px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:500;margin-bottom:14px}
.inp{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #d5d5d5;background:#fff;color:#111;font-size:13px;font-family:inherit}
.inp:focus{outline:none;border-color:#888}
.btn{padding:9px 20px;border-radius:8px;border:1px solid #d5d5d5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#111;display:inline-flex;align-items:center;gap:7px;transition:all .12s;font-family:inherit}
.btn:hover:not(:disabled){background:#f5f5f5}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-dark{background:#1A1A2E;color:#fff;border:none}
.btn-dark:hover:not(:disabled){background:#2d2d50}
.btn-green{background:#1B5E20;color:#fff;border:none;padding:11px 28px;font-size:14px}
.btn-green:hover:not(:disabled){background:#2E7D32}
.drop-zone{border:2px dashed #d5d5d5;border-radius:10px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .15s;background:#fafafa}
.drop-zone:hover,.drop-zone.over{border-color:#1A1A2E;background:#f0f0ff}
.drop-zone.has-files{border-color:#2E7D32;border-style:solid;background:#F1F8E9}
.file-item{display:flex;align-items:center;gap:10px;padding:7px 12px;background:#f5f5f5;border-radius:7px;margin-bottom:6px;font-size:12px}
.file-item .fi-name{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item .fi-size{color:#888;flex-shrink:0}
.file-item .fi-rm{cursor:pointer;color:#888;flex-shrink:0;padding:2px 6px;border-radius:4px}
.file-item .fi-rm:hover{color:#c00;background:#fee}
.progress-wrap{background:#e5e5e5;border-radius:99px;height:8px;overflow:hidden;margin:10px 0}
.progress-bar{height:100%;border-radius:99px;background:#1A1A2E;transition:width .3s}
.log{background:#1A1A2E;border-radius:8px;padding:14px 16px;font-family:monospace;font-size:12px;color:#aef;line-height:1.7;max-height:280px;overflow-y:auto;margin-top:12px}
.log-line{margin:0}.log-line.ok{color:#69f0ae}.log-line.warn{color:#ffd54f}.log-line.err{color:#ef9a9a}
.result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-top:14px}
.result-card{background:#f9f9f9;border-radius:8px;border:1px solid #e5e5e5;padding:12px 14px}
.rc-name{font-size:12px;font-weight:500;color:#111;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rc-rows{font-size:11px;color:#666}
.rc-rows span{font-weight:500;color:#111}
.chip{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:500}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;padding:10px 22px;border-radius:99px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999}
.toast.show{opacity:1}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 12px;font-size:11px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #e5e5e5;background:#f8f8f8}
.tbl td{padding:9px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.row-even{background:#fafafa}
.cb{width:18px;height:18px;border-radius:4px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;border:1.5px solid #ccc;background:transparent;transition:all .12s;vertical-align:middle}
.cb.on{background:#1A1A2E;border-color:#1A1A2E}
.notes-i{width:100%;padding:3px 8px;border-radius:5px;border:1px solid #e0e0e0;font-size:12px;font-family:inherit;background:#fff}
.notes-i:focus{outline:none;border-color:#888}
@media(max-width:640px){.page{padding:14px}}
</style>
</head>

<script>
// ═══ CONSTANTS ═══
const AT_BASE='appcwvcnVuHI9TMdA',AT_TABLE='tbl9LR604zEX4ppR3';
const AT_FIELDS=['fldlgN88d6xMdmgGE','fldpplV5P1srxOKiR','fldRkRlWGV612tmnd','fldMnCMSWz1XO8nCo','fld6f8fPC1WepKyEX','fldGKnrTB0ls25pge','fldFDHkhZGUowIRhq','fldZCgFjUzcRB6QV7','fld7bZKCwQKvLYKk9','fldV2NaeBOuZfeOBj','fldLTJu4MYP5IXxK3','fldutZNE72EdAT2mU','fldPmxdxfFGo2gLzz','fldHXxrmrOmo4jLDV','fldWaLqQk9z6AT8lX'];
const MENS_PREFIXES=['MAN','UNX','ACC','SUN'];
const SKIP_PO=new Set(['CANCELLED','CANCEL','DELIVERED','SHIPPED','PARTIALLY SHIPPED','SHIPPED UNDER OTHER PO']);
const SKIP_LINE=new Set(['CANCELLED','CANCEL','DELIVERED','ARRIVED','FULLY SHIPPED','ON HOLD','SHIPPED','PARTIALLY SHIPPED','SHIPPED UNDER OTHER PO']);
const CP_SKIP=new Set(['Pricing Matrix','Suppliers','freight','TEMPLATE','Reshoots','Production Tracker','AW26 RESTOCKS','MK101 replacements','restock checks','Return Updates','Cancelled','Next SKU','Merch - Roll Up','Template Trial View']);
const GENDER='mens',GENDER_LABEL='Menswear';
const WEEK=(()=>{const d=new Date(),j=new Date(d.getFullYear(),0,1);return Math.ceil((((d-j)/86400000)+j.getDay()+1)/7);})();
const TODAY=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
const FIXED_COLS=[
  {ci:1,h:'TYPE',w:14,t:'sys'},{ci:2,h:'RELEASE',w:28,t:'sys'},{ci:3,h:'SKU',w:16,t:'sys'},
  {ci:4,h:'PRODUCT NAME',w:34,t:'sys'},{ci:5,h:'COLOUR',w:14,t:'sys'},{ci:6,h:'MBF FABRIC CODE',w:18,t:'sys'},
  {ci:7,h:'COST ($)',w:10,t:'sys'},{ci:8,h:'COST APPROVED?',w:13,t:'sys'},{ci:9,h:'PO NUMBER (CP)',w:15,t:'sys'},
  {ci:10,h:'AIRTABLE POs & STATUS',w:34,t:'sys'},{ci:11,h:'TP SEND DATE',w:13,t:'sys'},
  {ci:12,h:'1ST SAMPLE FABRIC / COLOUR',w:20,t:'static'},{ci:13,h:'1ST SAMPLE SENT DATE',w:15,t:'static'},
  {ci:14,h:'1ST SAMPLE COMMENTS SENT DATE',w:20,t:'sys'},
  {ci:15,h:'2ND SAMPLE FABRIC / COLOUR',w:20,t:'static'},{ci:16,h:'2ND SAMPLE SENT DATE',w:15,t:'static'},
  {ci:17,h:'2ND SAMPLE COMMENTS SENT DATE',w:20,t:'sys'},
  {ci:18,h:'3RD SAMPLE FABRIC / COLOUR',w:20,t:'static'},{ci:19,h:'3RD SAMPLE SENT DATE',w:15,t:'static'},
  {ci:20,h:'3RD SAMPLE COMMENTS SENT DATE',w:20,t:'sys'},
  {ci:21,h:'PP SAMPLE FABRIC / COLOUR',w:20,t:'static'},{ci:22,h:'PP SAMPLE SENT DATE',w:15,t:'static'},
  {ci:23,h:'PP SAMPLE COMMENTS SENT DATE',w:20,t:'sys'},
  {ci:24,h:'2ND PP SAMPLE FABRIC / COLOUR',w:20,t:'static'},{ci:25,h:'2ND PP SAMPLE SENT DATE',w:15,t:'static'},
  {ci:26,h:'2ND PP SAMPLE COMMENTS SENT DATE',w:20,t:'sys'},
  {ci:27,h:'SHOOT SAMPLE FABRIC / COLOUR',w:20,t:'static'},{ci:28,h:'SHOOT SAMPLE SENT DATE',w:15,t:'static'},
  {ci:29,h:'SHOOT SAMPLE COMMENTS SENT DATE',w:20,t:'sys'},
  {ci:30,h:'SHOOT SAMPLE STATUS',w:16,t:'sys'},{ci:31,h:'SAMPLE STAGE',w:14,t:'sys'},
  {ci:32,h:'PO SENT DATE',w:13,t:'sys'},{ci:33,h:'BULK SPEC APPROVAL',w:15,t:'sys'},
  {ci:34,h:'BULK FABRIC APPROVAL',w:15,t:'sys'},{ci:35,h:'FABRIC NOTES',w:24,t:'static'},
  {ci:36,h:'QC DATE',w:13,t:'sys'},{ci:37,h:'SUPPLIER QC DATE',w:16,t:'static'},
  {ci:38,h:'APPROVED HANDOVER DATE',w:17,t:'sys'},{ci:39,h:'STATUS',w:24,t:'static'},
];
const N_FIXED=FIXED_COLS.length;

// ═══ INDEXED DB ═══
const IDB_NAME='mdv-wip-cache',IDB_STORE='uplus',IDB_VER=1;
let _idb=null;
function openIDB(){if(_idb)return Promise.resolve(_idb);return new Promise((res,rej)=>{const req=indexedDB.open(IDB_NAME,IDB_VER);req.onupgradeneeded=e=>e.target.result.createObjectStore(IDB_STORE,{keyPath:'key'});req.onsuccess=e=>{_idb=e.target.result;res(_idb);};req.onerror=e=>rej(e.target.error);});}
async function idbSave(key,value){const db=await openIDB();return new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).put({key,...value});tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);});}
async function idbGet(key){const db=await openIDB();return new Promise((res,rej)=>{const req=db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(key);req.onsuccess=e=>res(e.target.result||null);req.onerror=e=>rej(e.target.error);});}
async function idbList(prefix){const db=await openIDB();return new Promise((res,rej)=>{const results=[];const req=db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).openCursor();req.onsuccess=e=>{const cur=e.target.result;if(cur){if(cur.value.key.startsWith(prefix))results.push(cur.value);cur.continue();}else res(results);};req.onerror=e=>rej(e.target.error);});}
async function idbDelete(key){const db=await openIDB();return new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).delete(key);tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);});}

// Cache helpers
function wipCacheKey(sup){return `uplus-${GENDER}-${sup.replace(/[^a-zA-Z0-9]/g,'-').slice(0,40)}`;}
function staticCacheKey(sup,rowKey){return `static-${GENDER}-${sup.replace(/[^a-zA-Z0-9]/g,'-').slice(0,25)}-${String(rowKey).replace(/[^a-zA-Z0-9\-]/g,'-').slice(0,60)}`;}
async function saveWipCache(sup,week,uPlus){if(!uPlus||!uPlus.headers||!uPlus.headers.length)return;await idbSave(wipCacheKey(sup),{key:wipCacheKey(sup),gender:GENDER,supplier:sup,week,headers:uPlus.headers,data:uPlus.data});}
async function loadWipCache(sup){
  const all=await idbList(`uplus-${GENDER}-`);
  console.log('[CACHE] Looking for supplier:',sup,'cached entries:',all.map(e=>e.supplier));
  let f=all.find(e=>e.supplier===sup);
  if(!f){
    const norm=s=>String(s||'').replace(/[^a-zA-Z0-9]/g,'').toLowerCase();
    const t=norm(sup);
    f=all.find(e=>norm(e.supplier)===t);
    if(f)console.log('[CACHE] Fuzzy matched',sup,'to',f.supplier);
    else console.warn('[CACHE] No match found for',sup);
  }
  if(f)console.log('[CACHE] Found',f.supplier,'headers:',f.headers?.length,'data rows:',Object.keys(f.data||{}).length);
  return f||null;
}
async function loadAllCached(){const all=await idbList(`uplus-${GENDER}-`);const map={};for(const e of all)map[e.supplier]={week:e.week};return map;}
async function saveStaticData(sup,rowKey,vals){await idbSave(staticCacheKey(sup,rowKey),{key:staticCacheKey(sup,rowKey),gender:GENDER,supplier:sup,rowKey,vals});}
async function loadAllStaticForSupplier(sup){
  // Try exact prefix first, then normalised prefix
  const mkPrefix=s=>`static-${GENDER}-${s.replace(/[^a-zA-Z0-9]/g,'-').slice(0,25)}`;
  let all=await idbList(mkPrefix(sup));
  if(!all.length){
    // Fuzzy: try with non-alphanumeric stripped
    const normSup=sup.replace(/[^a-zA-Z0-9]/g,'-').replace(/-+/g,'-');
    all=await idbList(mkPrefix(normSup));
  }
  const map={};for(const e of all)map[e.rowKey||`${e.sku}||${e.po||'nopo'}`]=e.vals||{};return map;
}
const CP_CACHE_KEY=`cp-${GENDER}`;
async function saveCpCache(n,s,styles){await idbSave(CP_CACHE_KEY,{key:CP_CACHE_KEY,fileName:n,fileSize:s,parsedAt:new Date().toISOString(),styles});}
async function loadCpCache(){return await idbGet(CP_CACHE_KEY);}
async function clearCpCache(){await idbDelete(CP_CACHE_KEY);}

// ═══ AT FETCH ═══
function normSupplier(n){if(!n)return'';let s=String(n).replace(/\u00a0/g,' ').trim();while(s.length>=2&&((s.startsWith('"')&&s.endsWith('"'))||(s.startsWith("'")&&s.endsWith("'"))))s=s.slice(1,-1).trim();return s.replace(/\s+/g,' ');}
function getAtVal(cell){if(cell==null)return'';if(typeof cell==='string'||typeof cell==='number')return String(cell);if(typeof cell==='object'){if(Array.isArray(cell))return cell.map(i=>(typeof i==='object'?(i.name||''):String(i))).join(', ');return cell.name||'';}return'';}
async function fetchAtPage(filter,offset){const fq=AT_FIELDS.map(f=>`fields%5B%5D=${f}`).join('&');const url=`https://api.airtable.com/v0/${AT_BASE}/${AT_TABLE}?pageSize=100&returnFieldsByFieldId=true&cellFormat=string&timeZone=Europe%2FLondon&userLocale=en-gb&${fq}&filterByFormula=${encodeURIComponent(filter)}${offset?'&offset='+encodeURIComponent(offset):''}`;for(let a=0;a<4;a++){const r=await fetch(url,{headers:{'Authorization':`Bearer ${S.apiKey}`}});if(r.status===429&&a<3){await new Promise(x=>setTimeout(x,1500*(a+1)));continue;}if(!r.ok)throw new Error(`AT ${r.status}: ${await r.text()}`);return r.json();}}
async function fetchAtPrefix(prefix,onPage){const recs=[];let offset=null;while(true){const d=await fetchAtPage(`LEFT({SKU as Text},${prefix.length})="${prefix}"`,offset);recs.push(...(d.records||[]));onPage(recs.length);offset=d.offset||null;if(!offset)break;}return recs;}
async function fetchAtData(onProgress){const skuPoMap={},skuLines={},delPoLines={},atPoSeen=new Set();const GENDER_FILTER='OR(ARRAYJOIN({Gender})="Men\'s",ARRAYJOIN({Gender})="Unisex")';const allRecs=[];let _off=null;do{const d=await fetchAtPage(GENDER_FILTER,_off);allRecs.push(...(d.records||[]));onProgress(allRecs.length);_off=d.offset||null;}while(_off);for(const r of allRecs){const c=r.fields||{};const sku=String(getAtVal(c['fldlgN88d6xMdmgGE'])||'').trim();if(!sku)continue;const ps=String(getAtVal(c['fldpplV5P1srxOKiR'])||'').trim().toUpperCase();const ls=String(getAtVal(c['fldRkRlWGV612tmnd'])||'').trim().toUpperCase();const skuBase=sku.split('-').slice(0,2).join('-');const po=String(getAtVal(c['fld6f8fPC1WepKyEX'])||'').trim();if(!po)continue;atPoSeen.add(`${skuBase}||${po}`);if(SKIP_PO.has(ps)||SKIP_LINE.has(ls)){const k=`${skuBase}||${po}`;if(!delPoLines[k])delPoLines[k]={total:0,delivered:0};delPoLines[k].total++;delPoLines[k].delivered++;continue;}const sr=String(getAtVal(c['fldPmxdxfFGo2gLzz'])||'').trim();const hasShip=!!(sr&&sr!=='nan');if(!skuLines[skuBase])skuLines[skuBase]={total:0,shipped:0};skuLines[skuBase].total++;if(hasShip){skuLines[skuBase].shipped++;continue;}if(!skuPoMap[skuBase])skuPoMap[skuBase]={};if(!skuPoMap[skuBase][po]){skuPoMap[skuBase][po]={line_status:'',po_status:'',po_sent_date:'',bulk_spec_approval:'',bulk_fabric_approval:'',qc_date:'',approved_handover_date:'',supplier:'',release:'',product_title:'',colour:'',cost:''};}const d=skuPoMap[skuBase][po];if(ls&&!d.line_status)d.line_status=ls;if(ps&&!d.po_status)d.po_status=ps;const fm={'fldMnCMSWz1XO8nCo':'supplier','fldGKnrTB0ls25pge':'release','fldFDHkhZGUowIRhq':'po_sent_date','fldZCgFjUzcRB6QV7':'bulk_spec_approval','fld7bZKCwQKvLYKk9':'bulk_fabric_approval','fldV2NaeBOuZfeOBj':'qc_date','fldLTJu4MYP5IXxK3':'approved_handover_date','fldutZNE72EdAT2mU':'product_title','fldHXxrmrOmo4jLDV':'colour','fldWaLqQk9z6AT8lX':'cost'};for(const[fid,fn]of Object.entries(fm)){const v=String(getAtVal(c[fid])||'').trim();if(v&&v!=='nan'&&!d[fn])d[fn]=fn==='supplier'?normSupplier(v):v;}}const allShipped=new Set(Object.entries(skuLines).filter(([,c])=>c.total>0&&c.total===c.shipped).map(([s])=>s));const deliveredPos=new Set(Object.entries(delPoLines).filter(([,c])=>c.total>0&&c.total===c.delivered).map(([k])=>k));return{skuPoMap,allShipped,deliveredPos,atPoSeen,total:allRecs.length};}

// ═══ CP PARSER ═══
function readCellText(cell){if(!cell)return'';const v=cell.value;if(v==null||v==='')return'';if(typeof v==='string')return v.trim();if(typeof v==='number'||typeof v==='boolean')return String(v);if(v instanceof Date)return v.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'});if(typeof v==='object'){if(v.result!==undefined&&v.result!==null)return readCellText({value:v.result});if(v.richText)return v.richText.map(r=>r.text||'').join('').trim();if(v.text)return String(v.text).trim();}return'';}

async function parseCriticalPath(file){const ab=await file.arrayBuffer();const wb=new ExcelJS.Workbook();await wb.xlsx.load(ab);const styles=[];for(const ws of wb.worksheets){if(CP_SKIP.has(ws.name))continue;const release=ws.name.replace(/\s*\(.*$/,'').trim();let hdrRow=-1;const ci={};ws.eachRow((row,ri)=>{if(hdrRow>0)return;row.eachCell((cell,c)=>{const v=String(cell.value||'').trim().toUpperCase();if(!v)return;if(v==='SAMPLE NUMBER'&&!ci.sn){ci.sn=c;hdrRow=ri;}if(v==='SUPPLIER'&&!ci.sup)ci.sup=c;if(v==='SKU'&&!ci.sku)ci.sku=c;if(v==='PRODUCT NAME'&&!ci.name)ci.name=c;if(v==='COLOUR NAME'||v==='COLOR NAME')ci.colour=c;else if(!ci.colour&&(v==='COLOUR'||v==='COLOR'))ci.colour=c;if(v.includes('MBF')&&v.includes('FABRIC')&&v.includes('CODE'))ci.mbf=c;if(v==='SAMPLE STAGE')ci.stage=c;if(v==='SHOOT SAMPLE STATUS')ci.shoot=c;else if(!ci.shoot&&v.includes('SHOOT SAMPLE'))ci.shoot=c;if(v==='TP SEND OUT DATE')ci.tp=c;else if(!ci.tp&&v.includes('TP SEND'))ci.tp=c;if(v==='$ CP')ci.cost=c;if(v==='PO NUMBER')ci.po=c;else if(!ci.po&&v.includes('PO NUMBER'))ci.po=c;if(v==='1ST SAMPLE COMMENTS SENT DATE')ci.csd1=c;if(v==='2ND SAMPLE COMMENTS SENT DATE')ci.csd2=c;if(v==='3RD SAMPLE COMMENTS SENT DATE')ci.csd3=c;if(v==='PP SAMPLE COMMENTS SENT DATE')ci.csdpp=c;});});if(hdrRow<0||!ci.sn)continue;console.log('[CP] Tab:',ws.name,'headerRow:',hdrRow,'cols found:',JSON.stringify(ci));ws.eachRow((row,ri)=>{if(ri<=hdrRow)return;const sn=String(row.getCell(ci.sn).value||'').trim();if(!sn||sn==='nan'||sn.length<3)return;const sup=normSupplier(ci.sup?readCellText(row.getCell(ci.sup)):readCellText(row.getCell(Math.max(1,ci.sn-1))));if(!sup||['nan','DO NOT USE THIS ROW','TBD'].includes(sup))return;const sku=ci.sku?String(row.getCell(ci.sku).value||'').trim()||sn:sn;if(!sku||sku==='nan')return;const tpCell=ci.tp?row.getCell(ci.tp):null;let tp='';if(tpCell){const tv=tpCell.value;if(tv instanceof Date)tp=tv.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'});else{const raw=r // Faithful printer of CP + Airtable. No suppression, no factory reassignment, no sub-style
// borrowing, no reclassifying a PO mismatch into something else.
//   • Every CP style -> one NEW RELEASE row with its CP data verbatim, matched to Airtable on
//     the EXACT SKU (skuBase), never a parent/prefix.
//   • On that row: CP PO in the CP column, the matching Airtable PO in the AT column. If the CP
//     PO and AT PO disagree, or the AT PO sits under a different factory, a ⚠ note is appended
//     to the AT column (amber) — nothing is hidden or moved.

    // cancelled — i.e. it's been filtered out of the live PO map), this line is done: don't emit
    // it as an active New Release. Any OTHER live PO for the same exact SKU still shows as a
    // restock (e.g. UNX0034-01: CP PO-2391 handed over -> drop the NR, but PO-3184 stays as a restock).

    // exists, otherwise the first same-factory AT PO (so CP & AT POs sit side-by-side to compare).

// ═══ BUILD ═══
async function runBuild(){
  if(S.buildState!=='idle')return;
  if(!S.cpStyles){toast('Upload a Critical Path file first');return;}
  if(!S.apiKey){toast('Add your Airtable API key in Settings');return;}
  S.buildState='fetching';S.buildLog=[];S.buildResults=[];S.buildProgress=0;S.outputFiles={};S.supplierCheck=null;S.verification=null;render();
  try{
    log('Fetching Airtable data (MAN / UNX / ACC / SUN)...');setProgress(5);
    S.atData=await fetchAtData(n=>{log(`  ${n.toLocaleString()} records fetched...`);});
    log(`  Done. ${Object.keys(S.atData.skuPoMap).length} active SKU bases.`,'ok');setProgress(30);
    S.buildState='building';render();
    log('Building WIP rows...');
    const bySupplier=buildAllWipRows(S.cpStyles,S.atData);
    const sups=Object.keys(bySupplier).sort();
    log(`  ${sups.length} supplier files to generate`,'ok');
    S.supplierCheck=checkSuppliers(S.cpStyles,S.atData);setProgress(40);
    log('Loading previous WIP data...');
    const prevBySup={};
    // Case/punctuation-insensitive supplier match key. The build groups rows under the
    // supplier name from CP/Airtable; the WIP title row (A1: "WIP CHART — SUPPLIER") is that
    // same name upper-cased, so matching on this key always aligns — even when the dropped
    // file is renamed (e.g. "..._29_May.xlsx"). Matching on the filename instead caused the
    // dropped file to be ignored and a stale cache used, dropping the newest comment columns.
    const _supMatchKey=s=>String(s||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
    for(const f of S.prevWipFiles){
      log(`  Reading ${f.name}...`);
      const rd=await readPrevWip(f.file);
      // Default to the filename with any trailing date suffix (e.g. _29_May) stripped.
      let canonSup=f.name.replace(/^WIP_/,'').replace(/\.xlsx$/,'').replace(/_\d{1,2}[_ ]?[A-Za-z]{3,}.*$/,'').replace(/_/g,' ').trim();
      try{
        const abTitle=await f.file.arrayBuffer();
        const wbTitle=new ExcelJS.Workbook();await wbTitle.xlsx.load(abTitle);
        const wsTitle=wbTitle.worksheets[0];
        const titleCell=wsTitle&&wsTitle.getRow(1).getCell(1).value;
        const titleStr=titleCell&&String(titleCell.value||titleCell||'');
        const m=(titleStr||'').match(/WIP CHART\s+[-—]\s+(.+)/i);
        if(m)canonSup=m[1].trim().replace(/\s+/g,' ');
      }catch(e){}
      const mk=_supMatchKey(canonSup);
      const incoming={uPlus:{headers:rd.headers,data:rd.data,meta:rd.meta},staticData:rd.staticData,canon:canonSup};
      // If two dropped files map to the same supplier, keep the one with the most comment
      // history (the freshest), regardless of drop order.
      const existing=prevBySup[mk];
      if(!existing||rd.headers.length>(existing.uPlus.headers.length||0))prevBySup[mk]=incoming;
      log(`    → supplier "${canonSup}" (${rd.headers.length} comment cols)`);
      if(rd.headers.length>0)await saveWipCache(canonSup,S.week,{headers:rd.headers,data:rd.data});
      if(rd.staticData){for(const[rk,vals] of Object.entries(rd.staticData))await saveStaticData(canonSup,rk,vals);}
    }
    setProgress(55);
    log('Generating Excel files...');
    const zip=new JSZip();const results=[];
    for(let si=0;si<sups.length;si++){
      const sup=sups[si];const bucket=bySupplier[sup];
      const fname='WIP_'+sup.replace(/[^a-zA-Z0-9\s]/g,'').replace(/\s+/g,'_')+'.xlsx';
      let uPlus={headers:[],data:{}};
      const prev=prevBySup[_supMatchKey(sup)];
      if(prev&&prev.uPlus&&prev.uPlus.headers.length>0)uPlus=prev.uPlus;
      else{const cached=await loadWipCache(sup);if(cached)uPlus={headers:cached.headers||[],data:cached.data||{}};}
      const staticMap=await loadAllStaticForSupplier(sup);
      if(prev&&prev.staticData)Object.assign(staticMap,prev.staticData);
      const wb=await writeSupplierWip(sup,bucket.nr||[],bucket.rs||[],bucket.removed||[],uPlus,staticMap);
      const buf=await wb.xlsx.writeBuffer();
      zip.file(fname,buf);
      const url=URL.createObjectURL(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}));
      S.outputFiles[fname]=url;
      // Count rows with no comment history — FIX 1
      const allRowsForSup=[...(bucket.nr||[]),...(bucket.rs||[]),...(bucket.removed||[])];
      const noHistory=allRowsForSup.filter(r=>!hasPrevRow(uPlus,r)).length;
      results.push({supplier:sup,fname,nr:bucket.nr?.length||0,rs:bucket.rs?.length||0,removed:bucket.removed?.length||0,uPlus:uPlus.headers.length,noHistory});
      // Auto-save comment cache using canonical AT supplier name so next build finds it
      if(uPlus.headers.length>0) await saveWipCache(sup,S.week,uPlus);
      setProgress(55+Math.round((si+1)/sups.length*35));
      log(`  ${fname} — ${bucket.nr?.length||0} NR + ${bucket.rs?.length||0} RS + ${bucket.removed?.length||0} removed${uPlus.headers.length?'':', no comment history'}`,'ok');
    }
    log('Creating ZIP...');
    const zipBuf=await zip.generateAsync({type:'arraybuffer'});
    S.outputFiles['__ZIP__']=URL.createObjectURL(new Blob([zipBuf],{type:'application/zip'}));
    S.buildResults=results;
    log('Verifying...');S.verification=verifyBuild(bySupplier,S.cpStyles,S.atData);
    const{cpMissing,atMissing}=S.verification;
    if(!cpMissing.length&&!atMissing.length)log('  All CP styles and AT POs accounted for','ok');
    else log(`  ${cpMissing.length} CP + ${atMissing.length} AT items not in any WIP`,'warn');
    setProgress(100);log(`Build complete — ${sups.length} files`,'ok');S.buildState='done';
    const a=document.createElement('a');a.href=S.outputFiles['__ZIP__'];a.download=`MDV_Menswear_WIP_W${S.week}.zip`;a.click();
  }catch(e){log(`Error: ${e.message}`,'err');console.error(e);S.buildState='idle';}
  render();
}

async function importCache(){

  inp.onchange=async()=>{
    if(!inp.files[0])return;
    try{
      const entries=JSON.parse(await inp.files[0].text());

  <div class="page">`;

  if(S.tab==='build'){
    // CP
    html+=`<div class="card"><div class="card-title">1 &middot; Critical Path</div>`;
    if(S.cpFileInfo){const ago=S.cpFileInfo.parsedAt?` &middot; parsed ${fmtRelative(S.cpFileInfo.parsedAt)}`:'';html+=`<div style="background:#F1F8E9;border:1px solid #A5D6A7;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:10px">&#10003; <strong>${esc(S.cpFileInfo.name)}</strong>${S.cpFileInfo.size?` &middot; ${fmtBytes(S.cpFileInfo.size)}`:''}${ago} &nbsp;<button class="btn" style="padding:4px 10px;font-size:11px;float:right" onclick="clearCpCache();S.cpStyles=null;S.cpFileInfo=null;render()">Clear</button></div>`;}
    html+=`<div class="drop-zone${S.cpStyles?' has-files':''}" id="cp-drop"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><div style="margin-top:8px;font-size:13px;color:#555">${S.cpParsing?'Parsing...':S.cpStyles?`${S.cpStyles.length.toLocaleString()} styles loaded — drop a new file to update`:'Drop Menswear Critical Path xlsx here'}</div><div style="font-size:11px;color:#888;margin-top:4px">Click to browse &middot; Cached between sessions</div></div></div>`;
    // Previous WIPs — FIX 2 clearer wording
    html+=`<div class="card"><div class="card-title">2 &middot; Previous WIPs <span style="font-size:11px;color:#888;font-weight:400">(optional)</span></div>`;
    const hasCached=Object.keys(S.cachedComments).length>0;
    if(hasCached){
      const supList=Object.keys(S.cachedComments).map(s=>esc(s)).join(', ');
      html+=`<div style="background:#EEF4FF;border:1px solid #BBDEFB;border-radius:8px;padding:8px 12px;font-size:12px;color:#0D47A1;margin-bottom:10px">
        &#x1F4E6; <strong>${Object.keys(S.cachedComments).length} suppliers cached:</strong> ${supList}
        <div style="margin-top:4px;color:#555">Each supplier is cached independently — dropping a file only updates <em>that</em> supplier. All others stay untouched.</div>
      </div>`;
    }
    html+=`<div class="drop-zone${S.prevWipFiles.length?' has-files':''}" id="wip-drop"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><div style="margin-top:8px;font-size:13px;color:#555">Drop last week's WIP files here to load comment history</div><div style="font-size:11px;color:#888;margin-top:4px">WIP_Supplier_Name.xlsx &middot; Each file updates only that supplier's cache</div></div>
    ${S.prevWipFiles.map((f,i)=>`<div class="file-item"><span class="fi-name">${esc(f.name)}</span><span class="fi-size">${fmtBytes(f.file.size)}</span><span class="fi-rm" onclick="S.prevWipFiles.splice(${i},1);render()">&#10005;</span></div>`).join('')}</div>`;
    // Build button
    html+=`<div style="text-align:center;margin-bottom:20px"><button class="btn btn-green" ${canBuild?'':'disabled'} onclick="runBuild()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>${S.buildState==='fetching'?'Fetching Airtable...':S.buildState==='building'?'Building WIPs...':'Build WIP Charts'}</button>${!S.cpStyles?'<div style="font-size:12px;color:#888;margin-top:8px">Upload Critical Path above to enable</div>':''}${!S.apiKey?'<div style="font-size:12px;color:#e65100;margin-top:8px">Add Airtable API key in Settings</div>':''}</div>`;
    if(S.buildState!=='idle'){html+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:13px;font-weight:500">Build progress</span><span style="font-size:12px;color:#888">${S.buildProgress}%</span></div><div class="progress-wrap"><div class="progress-bar" id="build-pb" style="width:${S.buildProgress}%"></div></div><div class="log" id="build-log">${S.buildLog.map(l=>`<p class="log-line ${l.type}">${esc(l.msg)}</p>`).join('')}</div></div>`;}
    if(S.buildState==='done'&&S.supplierCheck){const sc=S.supplierCheck,hasIss=sc.cpOnly.length||sc.atOnly.length;html+=`<div class="card" style="border-left:4px solid ${hasIss?'#E65100':'#276221'};background:${hasIss?'#FFF8E7':'#F1F8E9'}"><div class="card-title" style="color:${hasIss?'#E65100':'#276221'}">${hasIss?'&#9888;':'&#10003;'} Supplier check — ${hasIss?`${sc.cpOnly.length+sc.atOnly.length} issues`:`All ${sc.matchedCount} match`}</div>${sc.cpOnly.length?`<div style="font-size:12px;margin-bottom:6px"><strong>In CP only:</strong> ${sc.cpOnly.map(s=>esc(s)).join(' &middot; ')}</div>`:''} ${sc.atOnly.length?`<div style="font-size:12px"><strong>In AT only:</strong> ${sc.atOnly.map(s=>esc(s)).join(' &middot; ')}</div>`:''}</div>`;}
    if(S.buildState==='done'&&S.verification){const vf=S.verification,tot=vf.cpMissing.length+vf.atMissing.length;html+=`<div class="card" style="border-left:4px solid ${tot?'#C62828':'#276221'};background:${tot?'#FFEBEE':'#F1F8E9'}"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><div class="card-title" style="color:${tot?'#C62828':'#276221'};margin:0">${tot?'&#9888;':'&#10003;'} Verification — ${tot?`${tot} items not in any WIP`:'Every CP style and AT PO is in a WIP'}</div>${tot?`<button class="btn btn-dark" style="padding:6px 12px;font-size:12px" onclick="downloadVerifCsv()">CSV</button>`:''}</div>${vf.cpMissing.length?`<div style="font-size:12px;font-weight:500;color:#C62828;margin-bottom:6px">CP styles missing (${vf.cpMissing.length})</div><div style="background:#fff;border:1px solid #ef9a9a;border-radius:6px;overflow:hidden;margin-bottom:12px"><table class="tbl" style="margin:0"><thead><tr><th>SKU</th><th>Supplier</th><th>Tab</th><th>Reason</th></tr></thead><tbody>${vf.cpMissing.slice(0,20).map((r,i)=>`<tr class="${i%2?'row-even':''}"><td>${esc(r.sku)}</td><td>${esc(r.supplier)}</td><td style="font-size:11px">${esc(r.tab)}</td><td style="font-size:11px;color:#C62828">${esc(r.reason)}</td></tr>`).join('')}</tbody></table></div>`:''}${vf.atMissing.length?`<div style="font-size:12px;font-weight:500;color:#C62828;margin-bottom:6px">AT POs missing (${vf.atMissing.length})</div><div style="background:#fff;border:1px solid #ef9a9a;border-radius:6px;overflow:hidden"><table class="tbl" style="margin:0"><thead><tr><th>SKU Base</th><th>PO</th><th>Supplier</th><th>Status</th></tr></thead><tbody>${vf.atMissing.slice(0,20).map((r,i)=>`<tr class="${i%2?'row-even':''}"><td>${esc(r.skuBase)}</td><td>${esc(r.po)}</td><td>${esc(r.supplier)}</td><td style="font-size:11px">${esc(r.line_status||r.po_status)}</td></tr>`).join('')}</tbody></table></div>`:''}    </div>`;}
    if(S.buildState==='done'&&S.buildResults.length){
      html+=`<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div class="card-title" style="margin:0">Build results — ${S.buildResults.length} files</div><button class="btn btn-dark" onclick="redownloadZip()">&#x2B07; Download ZIP</button></div><div class="result-grid">`;
      html+=S.buildResults.map(r=>`<div class="result-card"><div class="rc-name" title="${esc(r.supplier)}">${esc(r.supplier)}</div><div class="rc-rows"><span>${r.nr}</span> NR &middot; <span>${r.rs}</span> RS${r.removed?` &middot; <span style="color:#C62828">${r.removed}</span> review`:''}</div>${r.noHistory>0?`<div style="font-size:11px;color:#E65100;margin-top:3px">&#9888; ${r.noHistory} rows without comment history</div>`:`<div style="font-size:11px;color:#276221;margin-top:3px">&#10003; Comment history present</div>`}<div style="margin-top:6px"><a href="${S.outputFiles[r.fname]||'#'}" download="${esc(r.fname)}" style="font-size:11px;color:#1A1A2E">&#x2193; Download</a></div></div>`).join('');
      html+=`</div></div>`;
    }
  }
  else if(S.tab==='tracker'){
    const sups=getSuppliers();const rec=sups.filter(s=>S.tracker[s]?.received).length;const rep=sups.filter(s=>S.tracker[s]?.replied).length;
    html+=`<div style="margin-bottom:14px;display:flex;align-items:center;gap:12px"><div style="font-size:13px;font-weight:500">Week</div><input class="inp" style="width:80px" type="number" value="${esc(S.week)}" onchange="S.week=this.value;loadStorage();render()"><span class="chip" style="color:${rec===sups.length?'#276221':'#7B3F00'};background:${rec===sups.length?'#C6EFCE':'#FFF2CC'}">${rec}/${sups.length} received</span><span class="chip" style="color:#1A5276;background:#EEF4FF">${rep} replied</span></div>`;
    if(!sups.length){html+=`<div class="card" style="text-align:center;color:#888;padding:40px">Run a build first to populate suppliers</div>`;}
    else{html+=`<div class="card" style="padding:0;overflow:hidden"><table class="tbl"><thead><tr><th>Supplier</th><th style="text-align:center;width:90px">WIP Received</th><th style="text-align:center;width:90px">Replied to Fty</th><th>Notes</th></tr></thead><tbody>${sups.map((s,i)=>{const d=S.tracker[s]||{};const safe=s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");return`<tr class="${i%2?'row-even':''}"><td style="font-weight:${d.received?400:500}">${esc(s)}</td><td style="text-align:center"><div class="cb${d.received?' on':''}" onclick="toggleTk('${safe}','received')">${d.received?'<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3 5-6" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>':''}</div></td><td style="text-align:center"><div class="cb${d.replied?' on':''}" onclick="toggleTk('${safe}','replied')">${d.replied?'<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3 5-6" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>':''}</div></td><td><input class="notes-i" placeholder="Notes..." value="${esc(d.notes||'')}" onchange="setNote('${safe}',this.value)"></td></tr>`;}).join('')}</tbody></table></div><div style="margin-top:14px;text-align:right"><button class="btn" onclick="archiveWeek()">Archive week ${S.week}</button></div>`;}
  }
  else if(S.tab==='history'){
    html+=`<div class="card-title">Previous weeks</div>`;
    if(!S.history.length)html+=`<div style="text-align:center;padding:40px;color:#888">No history yet.</div>`;
    else html+=S.history.slice().reverse().map(h=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:14px 18px;margin-bottom:10px"><div><div style="font-size:14px;font-weight:500">Week ${h.week} &middot; ${h.gl||'Menswear'}</div><div style="font-size:12px;color:#888;margin-top:3px">${h.date} &middot; ${h.rec}/${h.tot} received &middot; ${h.rep} replied</div></div>${chip(h.rec===h.tot?'Complete &#10003;':(h.tot-h.rec)+' outstanding',h.rec===h.tot?'#276221':'#8B4513',h.rec===h.tot?'#C6EFCE':'#FFF2CC')}</div>`).join('');
  }
  else if(S.tab==='settings'){
    html+=`<div class="card"><div class="card-title">Airtable API Key</div><label style="font-size:11px;font-weight:500;color:#666;display:block;margin-bottom:6px">PERSONAL ACCESS TOKEN</label><input class="inp" type="password" placeholder="pat..." value="${esc(S.apiKey)}" oninput="S.apiKey=this.value;localStorage.setItem('mdv-api-key',this.value);render()"><div style="font-size:12px;color:#888;margin-top:6px">Stored locally in your browser only. Required scope: <code>data.records:read</code> on MDV Production &amp; Delivery.</div></div>
    <div class="card"><div class="card-title">Cache &amp; Sync</div>
      <div style="background:#FFF8E7;border:1px solid #F9A825;border-radius:8px;padding:12px 14px;font-size:13px;margin-bottom:14px">
        <strong>&#9888; Cache is per-browser — not shared between users.</strong><br>
        Each person (Naomi, Amana, Racie) has their own independent cache. Use Export/Import below to stay in sync. Whoever runs the weekly build should export and share the cache file with the others.
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
        <button class="btn btn-dark" onclick="exportCache()">&#x2B07; Export cache (share with team)</button>
        <button class="btn" onclick="importCache()">&#x2B06; Import cache (from teammate)</button>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
        <button class="btn" onclick="clearCommentCache()">Clear comment history</button>
        <button class="btn" onclick="clearCpCache().then(()=>{S.cpStyles=null;S.cpFileInfo=null;toast('CP cache cleared');render()})">Clear CP cache</button>
      </div>
      <div style="font-size:13px"><strong>${Object.keys(S.cachedComments).length}</strong> suppliers in comment cache:<br><span style="font-size:12px;color:#666">${Object.keys(S.cachedComments).map(s=>`${esc(s)} (W${S.cachedComments[s].week||'?'})`).join(' &middot; ')}</span></div>
    </div>`;
  }
  html+='</div>';
  document.getElementById('app').innerHTML=html;
  if(S.tab==='build'){
    setupDrop('cp-drop',async(files)=>{const xlsx=files.find(f=>f.name.endsWith('.xlsx'));if(!xlsx)return;S.cpFile=xlsx;S.cpParsing=true;S.cpFileInfo={name:xlsx.name,size:xlsx.size,parsedAt:null};S.cpStyles=null;S.buildState='idle';render();try{const styles=await parseCriticalPath(xlsx);S.cpStyles=styles;S.cpFileInfo.parsedAt=new Date().toISOString();await saveCpCache(xlsx.name,xlsx.size,styles);toast(`Parsed ${styles.length} styles`);}catch(e){alert('Failed to parse CP: '+e.message);S.cpFile=null;S.cpFileInfo=null;S.cpStyles=null;}finally{S.cpParsing=false;render();}});
    setupDrop('wip-drop',files=>{const x=files.filter(f=>f.name.endsWith('.xlsx'));x.forEach(f=>{if(!S.prevWipFiles.find(e=>e.name===f.name))S.prevWipFiles.push({name:f.name,file:f});});render();});
    const logEl=document.getElementById('build-log');if(logEl)logEl.scrollTop=logEl.scrollHeight;
  }
}

// ═══ HANDLERS ═══
function toggleTk(sup,field){if(!S.tracker[sup])S.tracker[sup]={received:false,replied:false,notes:''};S.tracker[sup][field]=!S.tracker[sup][field];saveTracker();render();}
function setNote(sup,val){if(!S.tracker[sup])S.tracker[sup]={received:false,replied:false,notes:''};S.tracker[sup].notes=val;saveTracker();}
function archiveWeek(){const sups=getSuppliers();const rec=sups.filter(s=>S.tracker[s]?.received).length;const rep=sups.filter(s=>S.tracker[s]?.replied).length;S.history=S.history.filter(h=>!(h.week===S.week&&h.gl===GENDER_LABEL));S.history.push({week:S.week,gl:GENDER_LABEL,date:TODAY,rec,rep,tot:sups.length});saveHistory();toast('Week '+S.week+' archived');render();}
async function clearCommentCache(){if(!confirm('Clear all cached comment data?'))return;const all=await idbList(`uplus-${GENDER}-`);for(const e of all)await idbDelete(e.key);S.cachedComments={};toast('Cache cleared');render();}
function redownloadZip(){const url=S.outputFiles['__ZIP__'];if(!url){toast('No zip available');return;}const a=document.createElement('a');a.href=url;a.download=`MDV_Menswear_WIP_W${S.week}.zip`;a.click();}
function downloadVerifCsv(){const vf=S.verification;if(!vf){toast('Run a build first');return;}const ec=s=>{const v=String(s??'');if(/[",\n]/.test(v))return'"'+v.replace(/"/g,'""')+'"';return v;};const lines=['Source,SKU,PO,Supplier,Tab,Reason'];for(const r of vf.cpMissing)lines.push(['CP',r.sku,r.po||'',r.supplier,r.tab,r.reason].map(ec).join(','));for(const r of vf.atMissing)lines.push(['AT',r.skuBase,r.po,r.supplier,r.line_status,r.po_status].map(ec).join(','));const blob=new Blob([lines.join('\n')],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`MDV_Mens_Verify_W${S.week}.csv`;a.click();}

render();
loadCachedInfo();
</script>
</body>
</html>
