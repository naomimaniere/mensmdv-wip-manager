<title>MDV WIP Builder — Menswear</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#111;background:#f4f4f4;min-height:100vh}
.header{background:#1A1A2E;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.h-title{color:#fff;font-size:15px;font-weight:500}
.h-sub{color:rgba(255,255,255,.45);font-size:11px;margin-top:2px}
.nav{background:#fff;border-bottom:1px solid #e5e5e5;padding:0 24px;display:flex}
.ntab{padding:11px 18px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#666;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit}
.ntab.active{color:#111;font-weight:500;border-bottom-color:#1A1A2E}
.page{padding:24px;max-width:960px;margin:0 auto}
.card{background:#fff;border-radius:12px;border:1px solid #e5e5e5;padding:20px 24px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:500;margin-bottom:14px}
.label{font-size:11px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;display:block}
.inp{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #d5d5d5;background:#fff;color:#111;font-size:13px;font-family:inherit}
.inp:focus{outline:none;border-color:#888}
.btn{padding:9px 20px;border-radius:8px;border:1px solid #d5d5d5;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#111;display:inline-flex;align-items:center;gap:7px;transition:all .12s;font-family:inherit}
.btn:hover:not(:disabled){background:#f5f5f5}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-dark{background:#1A1A2E;color:#fff;border:none}
.btn-dark:hover:not(:disabled){background:#2d2d50}
.btn-green{background:#1B5E20;color:#fff;border:none;padding:11px 28px;font-size:14px}
.btn-green:hover:not(:disabled){background:#2E7D32}
.drop-zone{border:2px dashed #d5d5d5;border-radius:10px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .15s;background:#fafafa}
.drop-zone:hover,.drop-zone.over{border-color:#1A1A2E;background:#f0f0ff}

.file-item .fi-size{color:#888;flex-shrink:0}

.file-item .fi-rm:hover{color:#c00;background:#fee}
.progress-wrap{background:#e5e5e5;border-radius:99px;height:8px;overflow:hidden;margin:10px 0}
.progress-bar{height:100%;border-radius:99px;background:#1A1A2E;transition:width .3s}
.log{background:#1A1A2E;border-radius:8px;padding:14px 16px;font-family:monospace;font-size:12px;color:#aef;line-height:1.7;max-height:280px;overflow-y:auto;margin-top:12px}
.log-line{margin:0}
.log-line.ok{color:#69f0ae}
.log-line.warn{color:#ffd54f}
.log-line.err{color:#ef9a9a}
.result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:14px}
.result-card{background:#f9f9f9;border-radius:8px;border:1px solid #e5e5e5;padding:12px 14px}
.rc-name{font-size:12px;font-weight:500;color:#111;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rc-rows{font-size:11px;color:#666}
.rc-rows span{font-weight:500;color:#111}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}
.chip{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:500}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;padding:10px 22px;border-radius:99px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999}
.toast.show{opacity:1}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{border-radius:8px;padding:12px;text-align:center}
.stat-n{font-size:24px;font-weight:500}
.stat-l{font-size:11px;margin-top:2px;opacity:.8}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 12px;font-size:11px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #e5e5e5;background:#f8f8f8}
.tbl td{padding:9px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.row-even{background:#fafafa}
.cb{width:18px;height:18px;border-radius:4px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;border:1.5px solid #ccc;background:transparent;transition:all .12s;vertical-align:middle}
.cb.on{background:#1A1A2E;border-color:#1A1A2E}

@media(max-width:640px){.stat-row{grid-template-columns:1fr 1fr}.page{padding:14px}}

<script>
// ═══════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════
const AT_BASE  = 'appcwvcnVuHI9TMdA';
const AT_TABLE = 'tbl9LR604zEX4ppR3';
const AT_FIELDS = [
  'fldlgN88d6xMdmgGE','fldpplV5P1srxOKiR','fldRkRlWGV612tmnd','fldMnCMSWz1XO8nCo',
  'fld6f8fPC1WepKyEX','fldGKnrTB0ls25pge','fldFDHkhZGUowIRhq','fldZCgFjUzcRB6QV7',
  'fld7bZKCwQKvLYKk9','fldV2NaeBOuZfeOBj','fldLTJu4MYP5IXxK3','fldutZNE72EdAT2mU',
  'fldPmxdxfFGo2gLzz','fldHXxrmrOmo4jLDV','fldWaLqQk9z6AT8lX',
];
const MENS_PREFIXES = ['MAN','UNX','ACC','SUN'];
const SKIP_PO   = new Set(['CANCELLED','CANCEL','DELIVERED','SHIPPED','PARTIALLY SHIPPED','SHIPPED UNDER OTHER PO']);
const SKIP_LINE = new Set(['CANCELLED','CANCEL','DELIVERED','ARRIVED','FULLY SHIPPED','ON HOLD','SHIPPED','PARTIALLY SHIPPED','SHIPPED UNDER OTHER PO']);
const CP_SKIP   = new Set([
  'Pricing Matrix','Suppliers','freight','TEMPLATE','Reshoots','Production Tracker',
  'AW26 RESTOCKS','MK101 replacements','restock checks','Return Updates','Cancelled',
  'Next SKU','Merch - Roll Up','Template Trial View',

const GENDER = 'mens';
const GENDER_LABEL = 'Menswear';
const WEEK = (()=>{const d=new Date(),j=new Date(d.getFullYear(),0,1);return Math.ceil((((d-j)/86400000)+j.getDay()+1)/7);})();
const TODAY = new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});

// 39 fixed cols — dark=system, static=supplier fills (preserved)
const FIXED_COLS = [
  {ci:1,  h:'TYPE',                             w:14, t:'sys'},

  {ci:31, h:'SAMPLE STAGE',                     w:14, t:'sys'},
  {ci:32, h:'PO SENT DATE',                     w:13, t:'sys'},
  {ci:33, h:'BULK SPEC APPROVAL',               w:15, t:'sys'},
  {ci:34, h:'BULK FABRIC APPROVAL',             w:15, t:'sys'},
  {ci:35, h:'FABRIC NOTES',                     w:24, t:'static'},
  {ci:36, h:'QC DATE',                          w:13, t:'sys'},
  {ci:37, h:'SUPPLIER QC DATE',                 w:16, t:'static'},
  {ci:38, h:'APPROVED HANDOVER DATE',           w:17, t:'sys'},
  {ci:39, h:'STATUS',                           w:24, t:'static'},
];
const N_FIXED = FIXED_COLS.length; // 39
const STATIC_COLS = new Set(FIXED_COLS.filter(c=>c.t==='static').map(c=>c.h));

// CP comment date col map: FIXED_COL_INDEX → CP column header
const CSD_COLS = {
  14: '1ST SAMPLE COMMENTS SENT DATE',
  17: '2ND SAMPLE COMMENTS SENT DATE',
  20: '3RD SAMPLE COMMENTS SENT DATE',
  23: 'PP SAMPLE COMMENTS SENT DATE',
};

// ═══════════════════════════════════════════════════════════
//  INDEXED DB
// ═══════════════════════════════════════════════════════════
const IDB_NAME='mdv-wip-cache', IDB_STORE='uplus', IDB_VER=1;
let _idb=null;
function openIDB(){
  if(_idb) return Promise.resolve(_idb);
  return new Promise((res,rej)=>{
    const req=indexedDB.open(IDB_NAME,IDB_VER);
    req.onupgradeneeded=e=>e.target.result.createObjectStore(IDB_STORE,{keyPath:'key'});
    req.onsuccess=e=>{_idb=e.target.result;res(_idb);};
    req.onerror=e=>rej(e.target.error);
  });
}
async function idbSave(key,value){
  const db=await openIDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).put({key,...value});
    tx.oncomplete=res; tx.onerror=e=>rej(e.target.error);
  });
}
async function idbGet(key){
  const db=await openIDB();
  return new Promise((res,rej)=>{
    const req=db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(key);
    req.onsuccess=e=>res(e.target.result||null);
    req.onerror=e=>rej(e.target.error);
  });
}
async function idbList(prefix){
  const db=await openIDB();
  return new Promise((res,rej)=>{
    const results=[];
    const req=db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).openCursor();
    req.onsuccess=e=>{
      const cur=e.target.result;
      if(cur){if(cur.value.key.startsWith(prefix))results.push(cur.value);cur.continue();}
      else res(results);
    };
    req.onerror=e=>rej(e.target.error);
  });
}
async function idbDelete(key){
  const db=await openIDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete=res; tx.onerror=e=>rej(e.target.error);
  });
}

// Comment + static data cache
function wipCacheKey(supplier){return `uplus-${GENDER}-${supplier.replace(/[^a-zA-Z0-9]/g,'-').slice(0,40)}`;}
// Static data cache: keyed by supplier+sku+po
function staticCacheKey(supplier,sku,po){
  const s=supplier.replace(/[^a-zA-Z0-9]/g,'-').slice(0,30);
  const k=(sku+'-'+(po||'nopo')).replace(/[^a-zA-Z0-9\-]/g,'-').slice(0,40);
  return `static-${GENDER}-${s}-${k}`;
}
async function saveWipCache(supplier,week,uPlus){
  if(!uPlus||!uPlus.headers||!uPlus.headers.length) return;
  const key=wipCacheKey(supplier);
  await idbSave(key,{key,gender:GENDER,supplier,week,headers:uPlus.headers,data:uPlus.data});
}
async function loadWipCache(supplier){
  const all=await idbList(`uplus-${GENDER}-`);
  let found=all.find(e=>e.supplier===supplier);
  if(!found){
    const norm=s=>String(s||'').replace(/^["']+|["']+$/g,'').replace(/\s+/g,' ').trim();
    const t=norm(supplier);
    found=all.find(e=>norm(e.supplier)===t);
  }
  return found||null;
}
async function loadAllCached(){
  const all=await idbList(`uplus-${GENDER}-`);
  const map={};
  for(const e of all) map[e.supplier]={week:e.week};
  return map;
}
async function saveStaticData(supplier,sku,po,vals){
  const key=staticCacheKey(supplier,sku,po);
  await idbSave(key,{key,gender:GENDER,supplier,sku,po,vals});
}
async function loadStaticData(supplier,sku,po){
  const entry=await idbGet(staticCacheKey(supplier,sku,po));
  return entry?entry.vals:{};
}
async function loadAllStaticForSupplier(supplier){
  const prefix=`static-${GENDER}-${supplier.replace(/[^a-zA-Z0-9]/g,'-').slice(0,30)}`;
  const all=await idbList(prefix);
  const map={};
  for(const e of all) map[`${e.sku}||${e.po||'nopo'}`]=e.vals||{};
  return map;
}

const CP_CACHE_KEY=`cp-${GENDER}`;
async function saveCpCache(fileName,fileSize,styles){
  await idbSave(CP_CACHE_KEY,{key:CP_CACHE_KEY,fileName,fileSize,parsedAt:new Date().toISOString(),styles});
}
async function loadCpCache(){return await idbGet(CP_CACHE_KEY);}
async function clearCpCache(){await idbDelete(CP_CACHE_KEY);}

// ═══════════════════════════════════════════════════════════
//  AIRTABLE FETCH
// ═══════════════════════════════════════════════════════════
function normSupplier(n){
  if(!n) return '';
  let s=String(n).replace(/\u00a0/g,' ').trim();
  while(s.length>=2&&((s.startsWith('"')&&s.endsWith('"'))||(s.startsWith("'")&&s.endsWith("'")))){s=s.slice(1,-1).trim();}
  return s.replace(/\s+/g,' ');
}
function getAtVal(cell){
  if(cell==null) return '';
  if(typeof cell==='string'||typeof cell==='number') return String(cell);
  if(typeof cell==='object'){
    if(Array.isArray(cell)) return cell.map(i=>(typeof i==='object'?(i.name||JSON.stringify(i)):String(i))).join(', ');
    return cell.name||'';
  }
  return '';
}
async function fetchAtPage(filterFormula,offset){
  const fieldsQ=AT_FIELDS.map(f=>`fields%5B%5D=${f}`).join('&');
  const filterQ=`&filterByFormula=${encodeURIComponent(filterFormula)}`;
  const offsetQ=offset?`&offset=${encodeURIComponent(offset)}`:'';
  const url=`https://api.airtable.com/v0/${AT_BASE}/${AT_TABLE}?pageSize=100&returnFieldsByFieldId=true&cellFormat=string&timeZone=Europe%2FLondon&userLocale=en-gb&${fieldsQ}${filterQ}${offsetQ}`;
  for(let attempt=0;attempt<4;attempt++){
    const resp=await fetch(url,{headers:{'Authorization':`Bearer ${S.apiKey}`}});
    if(resp.status===429&&attempt<3){await new Promise(r=>setTimeout(r,1500*(attempt+1)));continue;}
    if(!resp.ok) throw new Error(`Airtable error ${resp.status}: ${await resp.text()}`);
    return resp.json();
  }
}
async function fetchAtPrefix(prefix,onPage){
  const records=[];
  let offset=null;
  // Use LEFT({SKU as Text},3) for 3-char prefixes
  const filterFormula=`LEFT({SKU as Text},${prefix.length})="${prefix}"`;
  while(true){
    const data=await fetchAtPage(filterFormula,offset);
    records.push(...(data.records||[]));
    onPage(records.length);
    offset=data.offset||null;
    if(!offset) break;
  }
  return records;
}
async function fetchAtData(onProgress){
  const skuPoMap={},skuLines={},delPoLines={};
  const counts={};
  MENS_PREFIXES.forEach(p=>counts[p]=0);
  const arrays=await Promise.all(
    MENS_PREFIXES.map(p=>fetchAtPrefix(p,(n)=>{
      counts[p]=n;
      onProgress(Object.values(counts).reduce((a,b)=>a+b,0));
    }))
  );
  const allRecords=arrays.flat();
  for(const r of allRecords){
    const cells=r.fields||{};
    const sku=String(getAtVal(cells['fldlgN88d6xMdmgGE'])||'').trim();
    if(!sku) continue;
    const ps=String(getAtVal(cells['fldpplV5P1srxOKiR'])||'').trim().toUpperCase();
    const ls=String(getAtVal(cells['fldRkRlWGV612tmnd'])||'').trim().toUpperCase();
    const skuBase=sku.split('-').slice(0,2).join('-');
    const po=String(getAtVal(cells['fld6f8fPC1WepKyEX'])||'').trim();
    if(!po) continue;
    if(SKIP_PO.has(ps)||SKIP_LINE.has(ls)){
      const k=`${skuBase}||${po}`;
      if(!delPoLines[k]) delPoLines[k]={total:0,delivered:0};
      delPoLines[k].total++;delPoLines[k].delivered++;
      continue;
    }
    const sr=String(getAtVal(cells['fldPmxdxfFGo2gLzz'])||'').trim();
    const hasShip=!!(sr&&sr!=='nan');
    if(!skuLines[skuBase]) skuLines[skuBase]={total:0,shipped:0};
    skuLines[skuBase].total++;
    if(hasShip){skuLines[skuBase].shipped++;continue;}
    if(!skuPoMap[skuBase]) skuPoMap[skuBase]={};
    if(!skuPoMap[skuBase][po]){
      skuPoMap[skuBase][po]={
        line_status:'',po_status:'',po_sent_date:'',bulk_spec_approval:'',
        bulk_fabric_approval:'',qc_date:'',approved_handover_date:'',
        supplier:'',release:'',product_title:'',colour:'',cost:'',
      };
    }
    const d=skuPoMap[skuBase][po];
    if(ls&&!d.line_status) d.line_status=ls;
    if(ps&&!d.po_status) d.po_status=ps;
    const fm={
      'fldMnCMSWz1XO8nCo':'supplier','fldGKnrTB0ls25pge':'release',
      'fldFDHkhZGUowIRhq':'po_sent_date','fldZCgFjUzcRB6QV7':'bulk_spec_approval',
      'fld7bZKCwQKvLYKk9':'bulk_fabric_approval','fldV2NaeBOuZfeOBj':'qc_date',
      'fldLTJu4MYP5IXxK3':'approved_handover_date','fldutZNE72EdAT2mU':'product_title',
      'fldHXxrmrOmo4jLDV':'colour','fldWaLqQk9z6AT8lX':'cost',
    };
    for(const[fid,fname]of Object.entries(fm)){
      const v=String(getAtVal(cells[fid])||'').trim();
      if(v&&v!=='nan'&&!d[fname]) d[fname]=fname==='supplier'?normSupplier(v):v;
    }
  }
  const allShipped=new Set(Object.entries(skuLines).filter(([,c])=>c.total>0&&c.total===c.shipped).map(([s])=>s));
  const deliveredPos=new Set(Object.entries(delPoLines).filter(([,c])=>c.total>0&&c.total===c.delivered).map(([k])=>k));
  return{skuPoMap,allShipped,deliveredPos,total:allRecords.length};
}

// ═══════════════════════════════════════════════════════════
//  CP PARSER
// ═══════════════════════════════════════════════════════════
function readCellText(cell){
  if(!cell) return '';
  const v=cell.value;
  if(v==null||v==='') return '';
  if(typeof v==='string') return v.trim();
  if(typeof v==='number'||typeof v==='boolean') return String(v);
  if(v instanceof Date){
    return v.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'});
  }
  if(typeof v==='object'){
    if(v.result!==undefined&&v.result!==null) return readCellText({value:v.result});
    if(v.richText) return v.richText.map(r=>r.text||'').join('').trim();
    if(v.text) return String(v.text).trim();
  }
  return '';
}
function fmtDateStr(v){
  if(!v||v==='nan') return '';
  if(v instanceof Date) return v.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'});
  const s=String(v).trim();
  if(!s||s==='nan') return '';
  // Try to parse yyyy-mm-dd
  const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return `${m[3]}/${m[2]}/${m[1]}`;
  // Already dd/mm/yyyy
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)) return s;
  return s.slice(0,10);
}
async function parseCriticalPath(file){
  const ab=await file.arrayBuffer();
  const wb=new ExcelJS.Workbook();
  await wb.xlsx.load(ab);
  const styles=[];
  for(const ws of wb.worksheets){
    if(CP_SKIP.has(ws.name)) continue;
    const tabName=ws.name;
    // Strip date from tab name for release
    const release=tabName.replace(/\s*\(.*$/,'').trim();
    let hdrRow=-1;
    const colIdx={};
    ws.eachRow((row,ri)=>{
      if(hdrRow>0) return;
      row.eachCell((cell,ci)=>{
        const v=String(cell.value||'').trim().toUpperCase();
        if(!v) return;
        if(v==='SAMPLE NUMBER'&&!colIdx.sn){colIdx.sn=ci;hdrRow=ri;}
        if(v==='SUPPLIER'&&!colIdx.supplier) colIdx.supplier=ci;
        if(v==='SKU'&&!colIdx.sku) colIdx.sku=ci;
        if(v==='REVISED PRODUCT NAME') colIdx.name=ci;
        else if(!colIdx.name&&v==='PRODUCT NAME') colIdx.name=ci;
        if(v==='COLOUR NAME'||v==='COLOR NAME') colIdx.colour=ci;
        else if(!colIdx.colour&&(v==='COLOUR'||v==='COLOR')) colIdx.colour=ci;
        if(v.includes('MBF')&&v.includes('FABRIC')&&v.includes('CODE')) colIdx.mbf=ci;
        if(v==='SAMPLE STAGE') colIdx.stage=ci;
        if(v==='SHOOT SAMPLE STATUS') colIdx.shoot=ci;
        else if(!colIdx.shoot&&v.includes('SHOOT SAMPLE')) colIdx.shoot=ci;
        if(v==='TP SEND OUT DATE') colIdx.tp=ci;
        else if(!colIdx.tp&&v.includes('TP SEND')) colIdx.tp=ci;
        if(v==='$ CP') colIdx.cost=ci;
        if(v==='PO NUMBER') colIdx.po=ci;
        else if(!colIdx.po&&v.includes('PO NUMBER')) colIdx.po=ci;
        // Sample comments sent dates
        if(v==='1ST SAMPLE COMMENTS SENT DATE') colIdx.csd1=ci;
        if(v==='2ND SAMPLE COMMENTS SENT DATE') colIdx.csd2=ci;
        if(v==='3RD SAMPLE COMMENTS SENT DATE') colIdx.csd3=ci;
        if(v==='PP SAMPLE COMMENTS SENT DATE') colIdx.csdpp=ci;
      });
    });
    if(hdrRow<0||!colIdx.sn) continue;
    ws.eachRow((row,ri)=>{
      if(ri<=hdrRow) return;
      const sn=String(row.getCell(colIdx.sn).value||'').trim();
      if(!sn||sn==='nan'||sn.length<3) return;
      const sup=normSupplier(colIdx.supplier?readCellText(row.getCell(colIdx.supplier)):readCellText(row.getCell(Math.max(1,colIdx.sn-1))));
      if(!sup||['nan','DO NOT USE THIS ROW','TBD'].includes(sup)) return;
      const sku=colIdx.sku?String(row.getCell(colIdx.sku).value||'').trim()||sn:sn;
      if(!sku||sku==='nan') return;
      // TP date — required
      const tpCell=colIdx.tp?row.getCell(colIdx.tp):null;
      let tp='';
      if(tpCell){
        const tv=tpCell.value;
        if(tv instanceof Date) tp=tv.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'});
        else tp=fmtDateStr(readCellText(tpCell));
      }
      if(!tp) return;
      // PO
      let poRaw=colIdx.po?readCellText(row.getCell(colIdx.po)):'';
      poRaw=poRaw.replace('nan','').trim();
      let po=poRaw;
      if(po&&/^\d+(\.\d+)?$/.test(po)) po=`PO-${parseInt(po,10)}`;
      // Cost + approval from font color
      let cost='',costApproved='';
      if(colIdx.cost){
        const costCell=row.getCell(colIdx.cost);
        const cv=readCellText(costCell);
        if(cv&&cv!=='nan'){
          const num=parseFloat(cv);
          cost=isNaN(num)?cv:`$${num.toFixed(2)}`;
        }
        // Font colour: green=approved, red/blue=not approved
        let fontArgb='';
        if(costCell.font&&costCell.font.color) fontArgb=(costCell.font.color.argb||costCell.font.color.rgb||'').toUpperCase();
        if(fontArgb.endsWith('6AA84F')||fontArgb.endsWith('38761D')||fontArgb.endsWith('93C47D')) costApproved='YES';
        else if(fontArgb.endsWith('FF0000')||fontArgb.endsWith('0000FF')||fontArgb.endsWith('CC0000')) costApproved='NO';
      }
      // Sample comment dates
      const csd=(ci)=>ci?fmtDateStr(readCellText(row.getCell(ci))):'';
      styles.push({
        sku,skuBase:sku.split('-').slice(0,2).join('-'),
        supplier:sup,po,release,tab:tabName,
        name:colIdx.name?readCellText(row.getCell(colIdx.name)):'',
        colour:colIdx.colour?readCellText(row.getCell(colIdx.colour)):'',
        mbf:colIdx.mbf?readCellText(row.getCell(colIdx.mbf)):'',
        stage:colIdx.stage?readCellText(row.getCell(colIdx.stage)):'',
        shoot:colIdx.shoot?readCellText(row.getCell(colIdx.shoot)):'',
        tp,cost,costApproved,
        csd1:csd(colIdx.csd1),csd2:csd(colIdx.csd2),
        csd3:csd(colIdx.csd3),csdpp:csd(colIdx.csdpp),
      });
    });
  }
  return styles;
}

//  READ PREV WIP FILES — extract comment cols (AN+) and static cols
// ═══════════════════════════════════════════════════════════
async function readPrevWip(file){
  if(!file) return{headers:[],data:{},staticData:{}};
  const ab=await file.arrayBuffer();
  const wb=new ExcelJS.Workbook();
  await wb.xlsx.load(ab);
  const ws=wb.worksheets[0];
  if(!ws) return{headers:[],data:{},staticData:{}};
  const maxCol=ws.columnCount;
  const cmtStart=N_FIXED+1; // col 40
  const nCmt=maxCol-N_FIXED;
  if(nCmt<0) return{headers:[],data:{},staticData:{}};
  // Read headers row 3
  const headers=[];
  const hdrRow=ws.getRow(3);
  // Build col index by header name for fixed cols
  const fixedHdrMap={};
  for(const fc of FIXED_COLS) fixedHdrMap[fc.h]=fc.ci;
  // Find actual col positions from header row (handles reordering)
  const colByHdr={};
  for(let c=1;c<=maxCol;c++){
    const h=String(hdrRow.getCell(c).value||'').trim();
    if(h) colByHdr[h]=c;
  }
  for(let c=cmtStart;c<=maxCol;c++) headers.push(String(hdrRow.getCell(c).value||'').trim());
  const data={};
  const staticData={};
  ws.eachRow((row,ri)=>{
    if(ri<4) return;
    const skuC=colByHdr['SKU']||3;
    const atC=colByHdr['AIRTABLE POs & STATUS']||10;
    const cpPoC=colByHdr['PO NUMBER (CP)']||9;
    const sku=String(row.getCell(skuC).value||'').trim();
    if(!sku||String(row.getCell(1).value||'').includes('Total:')) return;
    const atVal=String(row.getCell(atC).value||'').trim().slice(0,80);
    const poMatch=atVal.match(/PO[-\d.]+/);
    const cpPo=String(row.getCell(cpPoC).value||'').trim();
    const poKey=poMatch?poMatch[0]:(cpPo||atVal.slice(0,40));
    const rowKey=`${sku}||${poKey}`;
    // Comment cols
    const cells=[];
    for(let c=cmtStart;c<=maxCol;c++){
      const cell=row.getCell(c);
      let fillArgb='';
      if(cell.fill&&cell.fill.fgColor) fillArgb=cell.fill.fgColor.argb||cell.fill.fgColor.rgb||'';
      let fontArgb='111111';
      if(cell.font&&cell.font.color) fontArgb=cell.font.color.argb||cell.font.color.rgb||'111111';
      cells.push({value:cell.value,fillArgb,fontArgb,bold:!!(cell.font&&cell.font.bold)});
    }
    data[rowKey]=cells;
    // Static cols
    const sv={};
    for(const fc of FIXED_COLS){
      if(fc.t!=='static') continue;
      const col=colByHdr[fc.h]||fc.ci;
      const v=row.getCell(col).value;
      if(v!=null&&String(v).trim()&&String(v).trim()!=='undefined') sv[fc.h]=String(v).trim();
    }
    if(Object.keys(sv).length>0) staticData[rowKey]=sv;
  });
  return{headers,data,staticData,count:nCmt};
}
function lookupUPlus(uPlus,sku,atKey){
  if(!uPlus||!uPlus.data) return[];
  const po=(atKey||'').match(/PO[-\d.]+/);
  const key=`${sku}||${po?po[0]:(atKey||'').slice(0,40)}`;
  if(uPlus.data[key]) return uPlus.data[key];
  const fb=Object.entries(uPlus.data).find(([k])=>k.startsWith(sku+'||'));
  return fb?fb[1]:[];
}
function lookupStatic(staticMap,sku,atKey){
  if(!staticMap) return{};
  const po=(atKey||'').match(/PO[-\d.]+/);
  const key=`${sku}||${po?po[0]:(atKey||'').slice(0,40)}`;
  if(staticMap[key]) return staticMap[key];
  const fb=Object.entries(staticMap).find(([k])=>k.startsWith(sku+'||'));
  return fb?fb[1]:{};
}

//  ROW BUILDING — first PO = NR, subsequent = RS
// ═══════════════════════════════════════════════════════════
function buildAllWipRows(cpStyles,atData){
  const bySupplier={};
  const cpBases=new Set();
  const ensureSup=(sup)=>{if(!bySupplier[sup])bySupplier[sup]={nr:[],rs:[],removed:[]};return bySupplier[sup];};

  for(const style of cpStyles){
    const sup=normSupplier(style.supplier);
    if(!sup) continue;
    if(!style.tp) continue;
    const skuBase=style.skuBase;
    cpBases.add(skuBase);
    const cpPo=style.po||'';
    const atEnts=atData.skuPoMap[skuBase]||{};

    if(cpPo&&atEnts[cpPo]){
      // Original CP PO still active → NR
      const poInfo=atEnts[cpPo];
      const atSup=poInfo.supplier?normSupplier(poInfo.supplier):sup;
      const atStatusText=`${cpPo} [${poInfo.line_status||poInfo.po_status||'PO SENT'}]`;
      const row={
        type:'NEW RELEASE',isRestock:false,
        sku:style.sku,skuBase,supplier:atSup,
        po:cpPo,atPo:cpPo,
        name:style.name,colour:style.colour,mbf:style.mbf,
        stage:style.stage,shoot:style.shoot,tp:style.tp,
        cost:style.cost,costApproved:style.costApproved,
        csd1:style.csd1,csd2:style.csd2,csd3:style.csd3,csdpp:style.csdpp,
        release:style.release,tab:style.tab,
        atStatus:atStatusText,atStatusType:'normal',
        poSent:poInfo.po_sent_date||'',bulkSpec:poInfo.bulk_spec_approval||'',
        bulkFab:poInfo.bulk_fabric_approval||'',qcDate:poInfo.qc_date||'',
        handover:poInfo.approved_handover_date||'',
      };
      ensureSup(atSup).nr.push(row);
      // Additional AT POs beyond CP PO → separate RS rows
      for(const[po,e] of Object.entries(atEnts)){
        if(po===cpPo) continue;
        const rsSup=e.supplier?normSupplier(e.supplier):sup;
        ensureSup(rsSup).rs.push({
          type:'RESTOCK',isRestock:true,
          sku:skuBase,skuBase,supplier:rsSup,
          po:'',atPo:po,
          name:style.name,colour:style.colour,mbf:'',stage:'',shoot:'',tp:'',
          cost:e.cost||style.cost,costApproved:'',
          csd1:'',csd2:'',csd3:'',csdpp:'',
          release:e.release||'',tab:'',
          atStatus:`${po} [${e.line_status||e.po_status||'PO SENT'}]`,atStatusType:'normal',
          poSent:e.po_sent_date||'',bulkSpec:e.bulk_spec_approval||'',
          bulkFab:e.bulk_fabric_approval||'',qcDate:e.qc_date||'',
          handover:e.approved_handover_date||'',
        });
      }
    } else if(cpPo&&Object.keys(atEnts).length>0){
      // CP PO delivered; active AT POs = restocks
      for(const[po,e] of Object.entries(atEnts)){
        const rsSup=e.supplier?normSupplier(e.supplier):sup;
        ensureSup(rsSup).rs.push({
          type:'RESTOCK',isRestock:true,
          sku:skuBase,skuBase,supplier:rsSup,
          po:'',atPo:po,
          name:style.name,colour:style.colour,mbf:'',stage:'',shoot:'',tp:'',
          cost:e.cost||style.cost,costApproved:'',
          csd1:'',csd2:'',csd3:'',csdpp:'',
          release:e.release||'',tab:'',
          atStatus:`${po} [${e.line_status||e.po_status||'PO SENT'}]`,atStatusType:'normal',
          poSent:e.po_sent_date||'',bulkSpec:e.bulk_spec_approval||'',
          bulkFab:e.bulk_fabric_approval||'',qcDate:e.qc_date||'',
          handover:e.approved_handover_date||'',
        });
      }
    } else {
      // No active AT POs
      let removeReason='';
      if(atData.allShipped.has(skuBase)) removeReason='ALL LINES SHIPPED';
      else if(cpPo&&atData.deliveredPos.has(`${skuBase}||${cpPo}`)) removeReason=`CP PO ${cpPo} ALREADY DELIVERED`;
      const atStatusText=cpPo&&!Object.keys(atEnts).length?'⚠ NO POs IN AIRTABLE':'';
      const row={
        type:'NEW RELEASE',isRestock:false,
        sku:style.sku,skuBase,supplier:sup,
        po:cpPo,atPo:cpPo,
        name:style.name,colour:style.colour,mbf:style.mbf,
        stage:style.stage,shoot:style.shoot,tp:style.tp,
        cost:style.cost,costApproved:style.costApproved,
        csd1:style.csd1,csd2:style.csd2,csd3:style.csd3,csdpp:style.csdpp,
        release:style.release,tab:style.tab,
        atStatus:atStatusText,atStatusType:cpPo&&!Object.keys(atEnts).length?'amber':'normal',
        poSent:'',bulkSpec:'',bulkFab:'',qcDate:'',handover:'',
      };
      if(removeReason) ensureSup(sup).removed.push({...row,removeReason});
      else ensureSup(sup).nr.push(row);
    }
  }
  // AT-only restocks
  for(const[skuBase,pos] of Object.entries(atData.skuPoMap)){
    if(cpBases.has(skuBase)) continue;
    for(const[po,info] of Object.entries(pos)){
      const sup=info.supplier?normSupplier(info.supplier):'';
      if(!sup) continue;
      if(!bySupplier[sup]) bySupplier[sup]={nr:[],rs:[],removed:[]};
      bySupplier[sup].rs.push({
        type:'RESTOCK',isRestock:true,
        sku:skuBase,skuBase,supplier:sup,
        po:'',atPo:po,
        name:info.product_title||'',colour:'',mbf:'',stage:'',shoot:'',tp:'',
        cost:info.cost||'',costApproved:'',
        csd1:'',csd2:'',csd3:'',csdpp:'',
        release:info.release||'',tab:'',
        atStatus:`${po} [${info.line_status||info.po_status||'PO SENT'}]`,atStatusType:'normal',
        poSent:info.po_sent_date||'',bulkSpec:info.bulk_spec_approval||'',
        bulkFab:info.bulk_fabric_approval||'',qcDate:info.qc_date||'',
        handover:info.approved_handover_date||'',
      });
    }
  }
  return bySupplier;
}

function checkSuppliers(cpStyles,atData){
  const cpSet=new Set();
  for(const s of cpStyles){const n=normSupplier(s.supplier);if(n)cpSet.add(n);}
  const atSet=new Set();
  for(const pos of Object.values(atData.skuPoMap))
    for(const info of Object.values(pos)) if(info.supplier)atSet.add(info.supplier);
  return{matchedCount:[...cpSet].filter(s=>atSet.has(s)).length,cpOnly:[...cpSet].filter(s=>!atSet.has(s)).sort(),atOnly:[...atSet].filter(s=>!cpSet.has(s)).sort()};
}

function verifyBuild(bySupplier,cpStyles,atData){
  const skusInWip=new Set(),skuPosInWip=new Set();
  for(const bucket of Object.values(bySupplier)){
    for(const r of[...(bucket.nr||[]),...(bucket.rs||[]),...(bucket.removed||[])]){
      if(r.sku) skusInWip.add(r.sku);
      if(r.skuBase) skusInWip.add(r.skuBase);
      if(r.atPo&&r.skuBase) skuPosInWip.add(`${r.skuBase}||${r.atPo}`);
      const ms=(r.atStatus||'').match(/PO[-\d.]+/g)||[];
      const base=r.skuBase||(r.sku?r.sku.split('-').slice(0,2).join('-'):'');
      for(const po of ms) if(base)skuPosInWip.add(`${base}||${po}`);
    }
  }
  const cpMissing=[];
  for(const s of cpStyles){
    if(skusInWip.has(s.sku)||skusInWip.has(s.skuBase)) continue;
    let reason='';
    if(!s.tp) reason='no TP send date';
    else if(!s.supplier) reason='no supplier';
    else reason='supplier name mismatch';
    cpMissing.push({sku:s.sku,supplier:s.supplier||'',name:s.name||'',tab:s.tab||'',po:s.po||'',reason});
  }
  const atMissing=[];
  for(const[skuBase,pos] of Object.entries(atData.skuPoMap||{})){
    for(const[po,info] of Object.entries(pos)){
      if(skuPosInWip.has(`${skuBase}||${po}`)) continue;
      atMissing.push({skuBase,po,supplier:info.supplier||'',product:info.product_title||'',line_status:info.line_status||'',po_status:info.po_status||''});
    }
  }
  cpMissing.sort((a,b)=>(a.supplier||'').localeCompare(b.supplier||'')||a.sku.localeCompare(b.sku));
  atMissing.sort((a,b)=>(a.supplier||'').localeCompare(b.supplier||'')||a.po.localeCompare(b.po));
  return{cpMissing,atMissing};
}

const DARK='FF1A1A2E',WHITE='FFFFFFFF';
const GREEN_F='FFC6EFCE',GREEN_T='FF276221',RED_T='FF8B1A1A';

function af(a){return{type:'pattern',pattern:'solid',fgColor:{argb:a}};}
function tb(){const s={style:'thin',color:{argb:'FFCCCCCC'}};return{top:s,bottom:s,left:s,right:s};}
function tkb(){const s={style:'medium',color:{argb:'FF888888'}};return{top:s,bottom:s,left:s,right:s};}

function uHdrFill(h){
  const u=h.toUpperCase();
  if(u.includes('NAOMI')||u.includes('ERIN')||u.includes('MDV')||u.includes('LUCY')||u.includes('YOUR COMMENT')) return 'FF5B5EA6';
  if(u.includes('JOANNE')) return 'FF5B5EA6';
  const FTY=['BOBO','FTY','FACTORY','WENXUAN','KIM','LIVIA','SUPPLIER','SHENGSHI','MICHAEL','WONGAS','GARY','ELLEN','DIANA','NATALIE','ELLA','JEAN'];
  if(FTY.some(k=>u.includes(k))) return 'FF4A4A4A';
  return 'FF1A5276';
}

        const cell=wsr.getCell(fc.ci);
        cell.fill=rf;cell.border=tb();cell.font=rfont;
        cell.alignment={horizontal:'left',vertical:'top',wrapText:true};
      }
      wsr.getCell(1).value='⛔ REVIEW: '+(row.removeReason||'AUTO-REMOVED');
      wsr.getCell(1).alignment={horizontal:'center',vertical:'middle',wrapText:true};
      wsr.getCell(2).value=row.release||'';
      wsr.getCell(3).value=sku;
      wsr.getCell(4).value=row.name||'';
      wsr.getCell(5).value=row.colour||'';
      wsr.getCell(9).value=row.po||'';
      wsr.getCell(10).value=row.atStatus||'';
      wsr.getCell(32).value=row.poSent||'';wsr.getCell(33).value=row.bulkSpec||'';
      wsr.getCell(34).value=row.bulkFab||'';wsr.getCell(36).value=row.qcDate||'';
      wsr.getCell(38).value=row.handover||'';
      // Static on removed rows
      for(const fc of FIXED_COLS){
        if(fc.t==='static'){
          const sv=prevStatic[fc.h];
          if(sv){wsr.getCell(fc.ci).value=sv;wsr.getCell(fc.ci).fill=rf;}
        }
      }
      const uCells=lookupUPlus(uPlus,sku,row.atStatus||'');
      for(let j=0;j<nU;j++){
        const ci=N_FIXED+1+j;const uc=uCells[j];const cell=wsr.getCell(ci);
        if(uc){
          cell.value=uc.value;
          if(uc.fillArgb&&uc.fillArgb.length>=6) cell.fill=af(uc.fillArgb.length===6?'FF'+uc.fillArgb:uc.fillArgb);
          const fa=uc.fontArgb&&uc.fontArgb.length>=6?(uc.fontArgb.length===6?'FF'+uc.fontArgb:uc.fontArgb):'FF111111';
          cell.font={color:{argb:fa},bold:uc.bold||false,size:9,name:'Arial'};
        }
        cell.alignment={horizontal:'left',vertical:'top',wrapText:true};cell.border=tb();
      }
      continue;
    }

    if(sku!==lastSku){parity=1-parity;lastSku=sku;}
    const isRS=row.isRestock;
    var baseFill=isRS?af(PURPLE_F):af(parity?STRIPPED:'FFFFFFFF');

    // Col 1: TYPE
    wc(1,isRS?'RESTOCK':'NEW RELEASE',isRS?af(PURPLE_F):baseFill,{bold:true,color:{argb:isRS?PURPLE_T:'FF1E40AF'},size:9,name:'Arial'},{horizontal:'center',vertical:'middle',wrapText:true});
    // Col 2: RELEASE
    wc(2,row.release,null,null,{horizontal:'left',vertical:'middle',wrapText:true});
    // Col 3: SKU
    wc(3,sku);
    // Col 4: PRODUCT NAME
    wc(4,row.name);
    // Col 5: COLOUR
    wc(5,row.colour,null,null,{horizontal:'left',vertical:'middle',wrapText:true});
    // Col 6: MBF FABRIC CODE
    wc(6,isRS?null:row.mbf,null,null,{horizontal:'left',vertical:'middle',wrapText:true});
    // Col 7: COST ($)
    wc(7,row.cost,null,null,{horizontal:'left',vertical:'middle',wrapText:true});
    // Col 8: COST APPROVED?
    if(row.costApproved==='YES') wc(8,'YES',af(GREEN_F),{bold:true,color:{argb:GREEN_T},size:9,name:'Arial'},{horizontal:'center',vertical:'middle',wrapText:true});
    else if(row.costApproved==='NO') wc(8,'NO',af('FFFCE4EC'),{bold:true,color:{argb:RED_T},size:9,name:'Arial'},{horizontal:'center',vertical:'middle',wrapText:true});
    else wc(8,null,null,null,{horizontal:'center',vertical:'middle'});
    // Col 9: PO NUMBER (CP) — blank for restocks
    wc(9,isRS?null:(row.po||null),null,null,{horizontal:'left',vertical:'middle',wrapText:true});
    // Col 10: AT STATUS
    const atAmber=row.atStatusType==='amber';
    wc(10,row.atStatus||null,atAmber?af(AMBER_F):baseFill,atAmber?{color:{argb:AMBER_T},size:9,name:'Arial'}:null,{horizontal:'left',vertical:'top',wrapText:true});
    // Col 11: TP SEND DATE — blank for restocks
    wc(11,isRS?null:(row.tp||null),null,null,{horizontal:'left',vertical:'middle',wrapText:true});
    // Cols 12–29: sample sections
    const csdMap={14:row.csd1||null,17:row.csd2||null,20:row.csd3||null,23:row.csdpp||null,26:null,29:null};
    for(const fc of FIXED_COLS){
      const ci=fc.ci;
      if(ci<12||ci>29) continue;
      if(fc.t==='static'){wStatic(ci,fc.h);}
      else{wc(ci,csdMap[ci]||null,null,null,{horizontal:'left',vertical:'middle',wrapText:true});}
    }
    // Col 30: SHOOT SAMPLE STATUS
    wc(30,isRS?null:(row.shoot||null),isRS?af('FFEEEEEE'):baseFill,null,{horizontal:'left',vertical:'middle',wrapText:true});
    if(isRS){wsr.getCell(30).fill=af('FFEEEEEE');}
    // Col 31: SAMPLE STAGE
    wc(31,isRS?null:(row.stage||null),isRS?af('FFEEEEEE'):baseFill,null,{horizontal:'left',vertical:'middle',wrapText:true});
    if(isRS){wsr.getCell(31).fill=af('FFEEEEEE');}
    // AT date fields
    wc(32,row.poSent||null,null,null,{horizontal:'left',vertical:'middle',wrapText:true});
    wc(33,row.bulkSpec||null,null,null,{horizontal:'left',vertical:'middle',wrapText:true});
    wc(34,row.bulkFab||null,null,null,{horizontal:'left',vertical:'middle',wrapText:true});
    wStatic(35,'FABRIC NOTES');
    wc(36,row.qcDate||null,null,null,{horizontal:'left',vertical:'middle',wrapText:true});
    wStatic(37,'SUPPLIER QC DATE');
    wc(38,row.handover||null,null,null,{horizontal:'left',vertical:'middle',wrapText:true});
    wStatic(39,'STATUS');
    // Comment cols (AN+)
    const uCells=lookupUPlus(uPlus,sku,atKey);
    for(let j=0;j<nU;j++){
      const ci=N_FIXED+1+j;const uc=uCells[j];const cell=wsr.getCell(ci);
      if(uc){
        cell.value=uc.value;
        if(uc.fillArgb&&uc.fillArgb.length>=6) cell.fill=af(uc.fillArgb.length===6?'FF'+uc.fillArgb:uc.fillArgb);
        const fa=uc.fontArgb&&uc.fontArgb.length>=6?(uc.fontArgb.length===6?'FF'+uc.fontArgb:uc.fontArgb):'FF111111';
        cell.font={color:{argb:fa},bold:uc.bold||false,size:9,name:'Arial'};
      }
      cell.alignment={horizontal:'left',vertical:'top',wrapText:true};cell.border=tb();
    }
  }
  // Footer
  const bot=4+allRows.length;
  ws.mergeCells(bot,1,bot,totalCols);
  const fc2=ws.getRow(bot).getCell(1);
  fc2.value=`Total: ${nrRows.length} NEW RELEASE + ${rsRows.length} RESTOCK + ${removedRows.length} to review  |  A–AM = system/static  AN+ = ${nU} comment cols`;
  fc2.fill=af('FFEEEEEE');fc2.font={bold:true,size:8,name:'Arial',color:{argb:'FF444444'}};
  fc2.alignment={horizontal:'left',vertical:'middle'};
  ws.views=[{state:'frozen',ySplit:3}];
  ws.autoFilter={from:{row:3,column:1},to:{row:bot-1,column:N_FIXED}};
  return wb;
}

async function loadCachedInfo(){
  try{
    S.cachedComments=await loadAllCached();
    const cp=await loadCpCache();

      S.cpStyles=cp.styles;

// ═══════════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════════
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtBytes(b){return b>1e6?(b/1e6).toFixed(1)+'MB':(b/1e3).toFixed(0)+'KB';}
function chip(t,c,bg){return `<span class="chip" style="color:${c};background:${bg}">${t}</span>`;}
function log(msg,type=''){
  S.buildLog.push({msg,type});
  const el=document.getElementById('build-log');
  if(el){el.innerHTML+=`<p class="log-line ${type}">${esc(msg)}</p>`;el.scrollTop=el.scrollHeight;}
}
function setProgress(p){S.buildProgress=p;const el=document.getElementById('build-pb');if(el)el.style.width=p+'%';}
function fmtRelative(iso){
  if(!iso) return '';
  const mins=Math.round((Date.now()-new Date(iso).getTime())/60000);
  if(mins<1)return'just now';if(mins<60)return`${mins}m ago`;
  const hrs=Math.round(mins/60);if(hrs<24)return`${hrs}h ago`;
  const days=Math.round(hrs/24);if(days<7)return`${days}d ago`;
  return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
}
function getSuppliers(){
  const sups=new Set();
  for(const r of S.buildResults) sups.add(r.supplier);
  for(const k of Object.keys(S.tracker)) sups.add(k);
  return [...sups].sort();
}
function setupDrop(id,cb){
  const el=document.getElementById(id);if(!el)return;
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('over');});
  el.addEventListener('dragleave',()=>el.classList.remove('over'));
  el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('over');cb([...e.dataTransfer.files]);});
  el.addEventListener('click',()=>{const inp=document.createElement('input');inp.type='file';inp.multiple=true;inp.accept='.xlsx';inp.onchange=()=>cb([...inp.files]);inp.click();});
}

//  MAIN BUILD
// ═══════════════════════════════════════════════════════════
async function runBuild(){
  if(S.buildState!=='idle') return;
  if(!S.cpStyles){toast('Upload a Critical Path file first');return;}
  if(!S.apiKey){toast('Set your Airtable API key in Settings first');return;}
  S.buildState='fetching';S.buildLog=[];S.buildResults=[];S.buildProgress=0;S.outputFiles={};
  S.supplierCheck=null;S.verification=null;
  render();
  try{
    // 1. Fetch AT
    log('Fetching Airtable data (MAN / UNX / ACC / SUN)…');
    setProgress(5);
    let atTotal=0;
    S.atData=await fetchAtData(n=>{atTotal=n;log(`  ${n.toLocaleString()} records…`);});
    log(`  ✓ ${atTotal.toLocaleString()} records fetched. ${Object.keys(S.atData.skuPoMap).length} active SKU bases.`,'ok');
    setProgress(30);
    // 2. Build rows
    S.buildState='building';render();
    log('Building WIP rows…');
    const bySupplier=buildAllWipRows(S.cpStyles,S.atData);
    const sups=Object.keys(bySupplier).sort();
    log(`  ${sups.length} supplier files to generate`,'ok');
    S.supplierCheck=checkSuppliers(S.cpStyles,S.atData);
    setProgress(40);
    // 3. Load previous WIP data
    log('Loading previous WIP data from cache…');
    const prevBySupplier={};
    for(const f of S.prevWipFiles){
      log(`  Reading ${f.name}…`);
      const rd=await readPrevWip(f.file);
      // Extract supplier name from filename: WIP_Supplier_Name.xlsx
      const sup=f.name.replace(/^WIP_/,'').replace(/\.xlsx$/,'').replace(/_/g,' ');
      prevBySupplier[sup]={uPlus:{headers:rd.headers,data:rd.data},staticData:rd.staticData};
      // Save to IDB
      if(rd.headers.length>0) await saveWipCache(sup,S.week,{headers:rd.headers,data:rd.data});
      if(rd.staticData&&Object.keys(rd.staticData).length>0){
        for(const[rowKey,vals] of Object.entries(rd.staticData)){
          const[rsku,rpo]=rowKey.split('||');
          await saveStaticData(sup,rsku,rpo||'nopo',vals);
        }
      }
    }
    setProgress(55);
    // 4. Generate Excel files
    log('Generating Excel files…');
    const zip=new JSZip();
    const results=[];
    for(let si=0;si<sups.length;si++){
      const sup=sups[si];
      const bucket=bySupplier[sup];
      const fname='WIP_'+sup.replace(/[^a-zA-Z0-9\s]/g,'').replace(/\s+/g,'_')+'.xlsx';
      // Load uPlus from IDB or prev files
      let uPlus={headers:[],data:{}};
      const prevData=prevBySupplier[sup];
      if(prevData&&prevData.uPlus&&prevData.uPlus.headers.length>0){
        uPlus=prevData.uPlus;
      } else {
        const cached=await loadWipCache(sup);
        if(cached) uPlus={headers:cached.headers||[],data:cached.data||{}};
      }
      // Load static data from IDB
      const staticMap=await loadAllStaticForSupplier(sup);
      // Also merge from prev file
      if(prevData&&prevData.staticData) Object.assign(staticMap,prevData.staticData);
      const wb=await writeSupplierWip(sup,bucket.nr||[],bucket.rs||[],bucket.removed||[],uPlus,staticMap);
      const buf=await wb.xlsx.writeBuffer();
      zip.file(fname,buf);
      const url=URL.createObjectURL(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}));
      S.outputFiles[fname]=url;
      results.push({supplier:sup,fname,nr:bucket.nr?.length||0,rs:bucket.rs?.length||0,removed:bucket.removed?.length||0,uPlus:uPlus.headers.length});
      setProgress(55+Math.round((si+1)/sups.length*35));
      log(`  ✓ ${fname} — ${bucket.nr?.length||0} NR + ${bucket.rs?.length||0} RS + ${bucket.removed?.length||0} removed`,'ok');
    }
    // 5. Zip
    log('Creating ZIP…');
    const zipBuf=await zip.generateAsync({type:'arraybuffer'});
    const zipUrl=URL.createObjectURL(new Blob([zipBuf],{type:'application/zip'}));
    S.outputFiles['__ZIP__']=zipUrl;
    S.buildResults=results;
    // 6. Verify
    log('Verifying…');
    S.verification=verifyBuild(bySupplier,S.cpStyles,S.atData);
    const {cpMissing,atMissing}=S.verification;
    if(!cpMissing.length&&!atMissing.length) log('  ✓ All CP styles and AT POs accounted for in WIPs','ok');
    else log(`  ⚠ ${cpMissing.length} CP styles + ${atMissing.length} AT POs not in any WIP`,'warn');
    setProgress(100);
    log(`Build complete — ${sups.length} files`,'ok');
    S.buildState='done';
    // Auto-download
    const a=document.createElement('a');a.href=zipUrl;a.download=`MDV_Menswear_WIP_W${S.week}.zip`;a.click();
  }catch(e){
    log(`Error: ${e.message}`,'err');
    S.buildState='idle';
  }
  render();
}

          <div style="background:#fff;border:1px solid #ef9a9a;border-radius:6px;overflow:hidden;margin-bottom:12px">
            <table class="tbl" style="margin:0"><thead><tr><th>SKU</th><th>Supplier</th><th>Tab</th><th>Reason</th></tr></thead>
            <tbody>${vf.cpMissing.slice(0,30).map((r,i)=>`<tr class="${i%2?'row-even':''}"><td>${esc(r.sku)}</td><td>${esc(r.supplier)}</td><td style="font-size:11px">${esc(r.tab)}</td><td style="font-size:11px;color:#C62828">${esc(r.reason)}</td></tr>`).join('')}</tbody>
            </table>${vf.cpMissing.length>30?`<div style="padding:6px 12px;font-size:11px;color:#888">…and ${vf.cpMissing.length-30} more</div>`:''}
          </div>`:''}
        ${vf.atMissing.length?`<div style="font-size:12px;font-weight:500;color:#C62828;margin-bottom:6px">AT POs missing (${vf.atMissing.length})</div>
          <div style="background:#fff;border:1px solid #ef9a9a;border-radius:6px;overflow:hidden">
            <table class="tbl" style="margin:0"><thead><tr><th>SKU Base</th><th>PO</th><th>Supplier</th><th>Status</th></tr></thead>
            <tbody>${vf.atMissing.slice(0,30).map((r,i)=>`<tr class="${i%2?'row-even':''}"><td>${esc(r.skuBase)}</td><td>${esc(r.po)}</td><td>${esc(r.supplier)}</td><td style="font-size:11px">${esc(r.line_status||r.po_status)}</td></tr>`).join('')}</tbody>
            </table>${vf.atMissing.length>30?`<div style="padding:6px 12px;font-size:11px;color:#888">…and ${vf.atMissing.length-30} more</div>`:''}
          </div>`:''}
      </div>`;
    }
    // Results
    if(S.buildState==='done'&&S.buildResults.length){
      html+=`<div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div class="card-title" style="margin:0">Build results — ${S.buildResults.length} files</div>
          <button class="btn btn-dark" onclick="redownloadZip()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download ZIP
          </button>
        </div>
        <div class="result-grid">
          ${S.buildResults.map(r=>`<div class="result-card">
            <div class="rc-name" title="${esc(r.supplier)}">${esc(r.supplier)}</div>
            <div class="rc-rows"><span>${r.nr}</span> NR · <span>${r.rs}</span> RS${r.removed?` · <span style="color:#C62828">${r.removed}</span> review`:''}</div>
            <div style="margin-top:6px"><a href="${S.outputFiles[r.fname]||'#'}" download="${esc(r.fname)}" style="font-size:11px;color:#1A1A2E">↓ Download</a></div>
          </div>`).join('')}
        </div>
      </div>`;
    }
  }

  // ── TRACKER TAB ──
  else if(S.tab==='tracker'){
    const sups=getSuppliers();
    const rec=sups.filter(s=>S.tracker[s]?.received).length;
    const rep=sups.filter(s=>S.tracker[s]?.replied).length;
    html+=`<div style="margin-bottom:14px;display:flex;align-items:center;gap:12px">
      <div style="font-size:13px;font-weight:500">Week</div>
      <input class="inp" style="width:80px" type="number" value="${esc(S.week)}" onchange="S.week=this.value;loadStorage();render()">
      ${chip(rec+'/'+sups.length+' received',rec===sups.length?'#276221':'#7B3F00',rec===sups.length?'#C6EFCE':'#FFF2CC')}
      ${chip(rep+' replied','#1A5276','#EEF4FF')}
    </div>`;
    if(!sups.length){html+=`<div class="card" style="text-align:center;color:#888;padding:40px">Run a build first to populate suppliers</div>`;}
    else{
      html+=`<div class="card" style="padding:0;overflow:hidden"><table class="tbl">
        <thead><tr><th>Supplier</th><th style="text-align:center;width:90px">WIP Received</th><th style="text-align:center;width:90px">Replied to Fty</th><th>Notes</th></tr></thead>
        <tbody>
          ${sups.map((s,i)=>{
            const d=S.tracker[s]||{};
            const safe=s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
            return `<tr class="${i%2?'row-even':''}">
              <td style="font-weight:${d.received?400:500}">${esc(s)}</td>
              <td style="text-align:center"><div class="cb${d.received?' on':''}" onclick="toggleTk('${safe}','received')">${d.received?'<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3 5-6" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>':''}</div></td>
              <td style="text-align:center"><div class="cb${d.replied?' on':''}" onclick="toggleTk('${safe}','replied')">${d.replied?'<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3 5-6" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>':''}</div></td>
              <td><input class="notes-i" placeholder="Notes…" value="${esc(d.notes||'')}" onchange="setNote('${safe}',this.value)"></td>
            </tr>`;
          }).join('')}
        </tbody></table></div>
      <div style="margin-top:14px;text-align:right"><button class="btn" onclick="archiveWeek()">Archive week ${S.week}</button></div>`;
    }
  }

  // ── HISTORY TAB ──
  else if(S.tab==='history'){
    html+=`<div class="card-title">Previous weeks</div>`;
    if(!S.history.length) html+=`<div style="text-align:center;padding:40px;color:#888">No history yet.</div>`;
    else html+=S.history.slice().reverse().map(h=>`
      <div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:14px 18px;margin-bottom:10px">
        <div>
          <div style="font-size:14px;font-weight:500">Week ${h.week} · ${h.gl||'Menswear'}</div>
          <div style="font-size:12px;color:#888;margin-top:3px">${h.date} · ${h.rec}/${h.tot} received · ${h.rep} replied</div>
        </div>
        ${chip(h.rec===h.tot?'Complete ✓':(h.tot-h.rec)+' outstanding',h.rec===h.tot?'#276221':'#8B4513',h.rec===h.tot?'#C6EFCE':'#FFF2CC')}
      </div>`).join('');
  }

  // ── SETTINGS TAB ──
  else if(S.tab==='settings'){
    html+=`<div class="card">
      <div class="card-title">Airtable API Key</div>
      <label class="label">Personal Access Token</label>
      <input class="inp" type="password" placeholder="pat…" value="${esc(S.apiKey)}" oninput="S.apiKey=this.value;localStorage.setItem('mdv-api-key',this.value);render()">
      <div style="font-size:12px;color:#888;margin-top:6px">Stored locally in your browser only. Required scopes: <code>data.records:read</code> on the MDV Production & Delivery base.</div>
    </div>
    <div class="card">
      <div class="card-title">Cache</div>
      <div style="font-size:13px;color:#555;margin-bottom:14px">Comment history and static column values are cached in your browser's IndexedDB. Clear only if you want to start fresh.</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn" onclick="clearCommentCache()">Clear comment history</button>
        <button class="btn" onclick="clearCpCache().then(()=>{S.cpStyles=null;S.cpFileInfo=null;toast('CP cache cleared');render()})">Clear CP cache</button>
      </div>
      <div style="margin-top:14px;font-size:13px">
        <strong>${Object.keys(S.cachedComments).length}</strong> suppliers in comment cache:<br>
        <span style="font-size:12px;color:#666">${Object.keys(S.cachedComments).map(s=>`${esc(s)} (W${S.cachedComments[s].week||'?'})`).join(' · ')}</span>
      </div>
    </div>`;
  }

  html+='</div>';
  document.getElementById('app').innerHTML=html;
  if(S.tab==='build'){
    setupDrop('cp-drop',async(files)=>{
      const xlsx=files.find(f=>f.name.endsWith('.xlsx'));
      if(!xlsx) return;
      S.cpFile=xlsx;S.cpParsing=true;S.cpFileInfo={name:xlsx.name,size:xlsx.size,parsedAt:null};
      S.cpStyles=null;S.buildState='idle';render();
      try{
        const styles=await parseCriticalPath(xlsx);
        S.cpStyles=styles;S.cpFileInfo.parsedAt=new Date().toISOString();
        await saveCpCache(xlsx.name,xlsx.size,styles);
        toast(`Parsed ${styles.length} styles`);
      }catch(e){alert('Failed to parse CP: '+e.message);S.cpFile=null;S.cpFileInfo=null;S.cpStyles=null;}
      finally{S.cpParsing=false;render();}
    });
    setupDrop('wip-drop',files=>{
      const x=files.filter(f=>f.name.endsWith('.xlsx'));
      x.forEach(f=>{if(!S.prevWipFiles.find(e=>e.name===f.name))S.prevWipFiles.push({name:f.name,file:f});});
      render();
    });
    const logEl=document.getElementById('build-log');
    if(logEl) logEl.scrollTop=logEl.scrollHeight;
  }
}

// ═══════════════════════════════════════════════════════════
//  HANDLERS
// ═══════════════════════════════════════════════════════════
function toggleTk(sup,field){if(!S.tracker[sup])S.tracker[sup]={received:false,replied:false,notes:''};S.tracker[sup][field]=!S.tracker[sup][field];saveTracker();render();}
function setNote(sup,val){if(!S.tracker[sup])S.tracker[sup]={received:false,replied:false,notes:''};S.tracker[sup].notes=val;saveTracker();}
function archiveWeek(){
  const sups=getSuppliers();
  const rec=sups.filter(s=>S.tracker[s]?.received).length;
  const rep=sups.filter(s=>S.tracker[s]?.replied).length;
  S.history=S.history.filter(h=>!(h.week===S.week&&h.gl===GENDER_LABEL));
  S.history.push({week:S.week,gl:GENDER_LABEL,date:TODAY,rec,rep,tot:sups.length});
  saveHistory();toast('Week '+S.week+' archived');render();
}
async function clearCommentCache(){
  if(!confirm('Clear all cached comment data? This cannot be undone.')) return;
  const all=await idbList(`uplus-${GENDER}-`);
  for(const e of all) await idbDelete(e.key);
  S.cachedComments={};toast('Cache cleared');render();
}
function redownloadZip(){
  const url=S.outputFiles['__ZIP__'];if(!url){toast('No zip available');return;}
  const a=document.createElement('a');a.href=url;a.download=`MDV_Menswear_WIP_W${S.week}.zip`;a.click();
}
function downloadVerifCsv(){
  const vf=S.verification;if(!vf){toast('Run a build first');return;}
  const ec=s=>{const v=String(s??'');if(/[",\n]/.test(v))return'"'+v.replace(/"/g,'""')+'"';return v;};
  const lines=['Source,SKU,PO,Supplier,Tab,Reason'];
  for(const r of vf.cpMissing) lines.push(['CP',r.sku,r.po||'',r.supplier,r.tab,r.reason].map(ec).join(','));
  for(const r of vf.atMissing) lines.push(['AT',r.skuBase,r.po,r.supplier,r.line_status,r.po_status].map(ec).join(','));
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`MDV_Mens_Verify_W${S.week}.csv`;a.click();
}

render();
loadCachedInfo();
</script>
</body>
</html>
